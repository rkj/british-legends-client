<!DOCTYPE html>
<html>
<head>
    <title>MUD1 Historic Curated Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e8dcc7; /* Parchment background */
            font-family: serif;
            overflow: hidden;
        }
        #cy {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(248, 244, 230, 0.9);
            padding: 20px;
            border-radius: 4px;
            border: 2px solid #2a2a2a;
            max-width: 400px;
            z-index: 10;
            pointer-events: none;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }
        .room-title {
            color: #2a2a2a;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .room-desc {
            color: #4a4a4a;
            font-size: 16px;
            line-height: 1.4;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="hud">
        <div class="room-title">Historic Curated Map</div>
        <div class="room-desc">Hover over any room to see its description. Click and drag to pan, scroll to zoom. Map curated from Richard Bartle's original sketches.</div>
    </div>
    <script>
        var cy = cytoscape({
            container: document.getElementById('cy'),
            autoungrabify: true, // Prevent nodes from being grabbed or dragged
            autolock: true, // Prevent nodes from being programmatically moved
            elements: {
                nodes: [{"data": {"id": "dwroom", "name": "Dwarf room.", "description": "This is a room which seems to have been recently constructed by the dwarfs who inhabit this realm, for at the moment it has no furnishings or even a door. The only way out is via an opening to the south which leads onto the bend of a low passage."}, "position": {"x": 0, "y": 0}}, {"data": {"id": "dwstre", "name": "Dwarf store.", "description": "Herein, the dwarfs keep most of their equipment and tools. The walls are hung with assorted spades, clothes, planks of wood and the like, but most are too small for you to use. The only exit is a doorway to the east."}, "position": {"x": -240, "y": 240}}, {"data": {"id": "lowps2", "name": "Low passage.", "description": "You are stood in a low, dwarfen passage, which runs from the south, turns to the east, and continues. There is an opening on the north wall into a room, and to the west is a doorway."}, "position": {"x": 0, "y": 240}}, {"data": {"id": "lowps3", "name": "Low passage.", "description": "This is a low, east-west passage. At the west end, it continues on into the dark, but at the east end it opens up onto a comparatively large room. To the northeast is an opening, from which issues a peculiar odour."}, "position": {"x": 240, "y": 240}}, {"data": {"id": "dwbog", "name": "Dwarf lavatory.", "description": "This is the small room the dwarfs use to excrete their waste bodily products. Although there is no door (the exit is an opening to the southwest), privacy is maintained by the room being on a slight upward slant, out of the line of sight from the passage outside. Understandably, being such a small room, there is a pungent odour here."}, "position": {"x": 360, "y": 0}}, {"data": {"id": "dwfood", "name": "Food store.", "description": "This is the room the dwarfs who live here use to store their food supplies. It is packed full of assorted vittles and foodstuffs, most of which are in too small quantities for you to bother with. The only way out is through a doorway to the east."}, "position": {"x": -240, "y": 480}}, {"data": {"id": "lowps1", "name": "Low passage.", "description": "You are walking down a low, well-trodden passage. To the north, the passage continues, and to the south it opens out into a large hall. East is what looks like a kitchen, and to the west is a doorway."}, "position": {"x": 0, "y": 480}}, {"data": {"id": "dwpit", "name": "Refuse pit.", "description": "This evil-smelling room is where the dwarfs toss their rubbish, from the kitchen. All around are masses of decomposing foodstuffs, in various states of decay, and filty, broken articles not even the previous owners would be able to recognise. The only way out is via a short climb to the south."}, "position": {"x": 240, "y": 480}}, {"data": {"id": "dwktch", "name": "Dwarf kitchen.", "description": "You are stood in the dwarf kitchen, quite large and full of kitchen- like utensils which are regretably too small to be of use to you. There is a doorway to the northeast, with food stains on the floor near it, and an opening onto a low passage to the west. North is a pit in which refuse is thrown to decompose away."}, "position": {"x": 360, "y": 480}}, {"data": {"id": "dwcant", "name": "Canteen.", "description": "This is the room where the dwarfs partake of their meals. It is quite large, and has a long table running down the middle, bolted to the ground. There are two low passages leaving the room; one to the west, and one to the south. To the southwest is a doorway, and there are no other exits. The walls are painted in pictures of grassy pastures."}, "position": {"x": 480, "y": 240}}, {"data": {"id": "lowps4", "name": "Low passage.", "description": "This is a low passage, leading from what appears to be a canteen to the north, to a doorway at the southern end."}, "position": {"x": 600, "y": 480}}, {"data": {"id": "dwstep", "name": "Dwarf steps.", "description": "You are using some narrow, closely-spaced stairs, which descend in a straight line from a room to the west to a doorway to the east. At the top of the steps are strange decorations, presumably put there to ward off evil presences, such as yours..."}, "position": {"x": -240, "y": 720}}, {"data": {"id": "dwhall", "name": "Dwarfen hall.", "description": "The room in which you stand is impressive in size, even by non-dwarf standards. High above is a red brick ceiling, and the floor is decorated by a colourful, if crudely-made, mosaic. There are low passages leading off to the north and east, and a higher passage to the south (probably so long weapons don't scratch the roof). West is a doorway, which looks well-used."}, "position": {"x": 0, "y": 720}}, {"data": {"id": "lowps5", "name": "Low passage.", "description": "You are striding down a low passage, which forms a sort of T-junction. To the west, it leads into a large hall, and to the east it opens up into a room, whereas south, it carries on into the dark."}, "position": {"x": 240, "y": 720}}, {"data": {"id": "dwrm1", "name": "Dwarf room.", "description": "This is a general-purpose room, used by the dwarfs for some of their normal everyday activities. Strewn about it in a seemingly random fashion, yet firmly fixed to the floor, are various items of furniture and the like. There is a doorway to the north, and a low passage leading off to the west."}, "position": {"x": 480, "y": 720}}, {"data": {"id": "guard1", "name": "Dwarf guard room.", "description": "You are stood in a guard room built specifically to prevent access, presumably to the doorway which is to the south. There are crimson stains on the floor which have been unsuccessfully attempted to be removed. North is an opening onto a large hall, and southeast is another room."}, "position": {"x": 0, "y": 960}}, {"data": {"id": "lowps6", "name": "Low passage.", "description": "You are in a low passage, which heads north to become the central leg of a T-junction, and runs south to end in a doorway. East, it opens up into a room."}, "position": {"x": 240, "y": 960}}, {"data": {"id": "dwrm2", "name": "Dwarf room.", "description": "This is a room used by the dwarfs for everyday living, mainly by the females and children. There is a doorway to the north, and another room to the south. Northwest, there is an opening onto a guard room."}, "position": {"x": 480, "y": 960}}, {"data": {"id": "wpnstr", "name": "Weapon store.", "description": "All about you is the most horrifying assortment of weapons you care to envisage. Although they are too small for you to use in the main, the various iron maidens, thumbscrews and racks also present show that the dwarfs also use the room for torturing prisoners and each other. The only exit is to the east, into a guard room."}, "position": {"x": -240, "y": 1200}}, {"data": {"id": "guard2", "name": "Dwarf guard room.", "description": "This is the inner guard room. The wall is decorated in battle scenes, all of which end in the dwarfs winning. North is a doorway, and south a low passage. To the west is a weapon store, which it appears the room is primarily designed to guard."}, "position": {"x": 0, "y": 1200}}, {"data": {"id": "dorm", "name": "Dormitory.", "description": "This is a large room, wherein sleep most of the unmarried dwarfs. It is full of little hammocks upon which the dwarfs rest, sturdily fixed to the wall to prevent their theft. To the south is the more classy Officers' dormitory, and to the north is a heavy doorway, built to be sound-proof."}, "position": {"x": 480, "y": 1200}}, {"data": {"id": "minrm", "name": "Ministerial room.", "description": "This is the dwarfen parliament room, where the king's ministers debate the issues of the dwarfen realm. It is richly fashioned with oak fittings, designed to hold, say, ten or so dwarfs excluding the king himself. There is a doorway to the east, and a guard room to the south."}, "position": {"x": -240, "y": 1440}}, {"data": {"id": "lowps7", "name": "Low passage.", "description": "You are stood in a low passage connecting two guard rooms, one to the north and one to the south. There is a doorway to the west which is of polished wood, and seems to be to somewhere very important."}, "position": {"x": 0, "y": 1440}}, {"data": {"id": "odorm", "name": "Officers' dormitory.", "description": "This rather smart room is used as living quarters for officers and other high-ranking dwarfs. Its walls are painted mainly in portraits of dwarfs which all seem to look the same, due to their large beards. To the south is a doorway, and to the north the large dormitory of the lower dwarfs."}, "position": {"x": 480, "y": 1440}}, {"data": {"id": "guard4", "name": "Dwarf guard room.", "description": "This is the home of the king's guard, special, hand-picked troops of the highest order, pledged to lay their lives down in order to save that of their regal master. To the north is a room which seems to indicate use as a debating forum of some kind, and from it through this room runs a red fitted carpet to a doorway in the south wall. The doorway itself is of heavy oak, and although elegantly finished seems to be built more with strength in mind than ornamentation."}, "position": {"x": -240, "y": 1680}}, {"data": {"id": "guard3", "name": "Dwarf guard room.", "description": "You are in a guard room, bedecked in fine war trophies, most of which are out of reach on the surprisingly high walls. The room is normally reached by a low passage to the north, but to the south is a doorway of very old oak, shined and polished to perfection. Obviously, it hides something regarded with importance."}, "position": {"x": 0, "y": 1680}}, {"data": {"id": "dwrm4", "name": "Dwarf room.", "description": "You look about to find yourself in a room used mainly during the evenings and for relaxation. The older dwarfs are the kind you'd expect to find here, for it is surprisingly quiet and well furnished. There is another room to the north, and a low passage to the east. South you observe a doorway."}, "position": {"x": 240, "y": 1680}}, {"data": {"id": "lowps9", "name": "Low passage.", "description": "You are standing in a low passage, with three exits. West, the passage leads into a room; south it opens into a dormitory; north, it ends in a doorway."}, "position": {"x": 480, "y": 1680}}, {"data": {"id": "kingrm", "name": "Throne room.", "description": "This is the throne room, the very seat of power in the dwarfen realm. It is luxuriously carpeted, and the walls are painted gold. It is here that the dwarfen king holds audiences and receives oaths of fealty. The king's study is to the east, and southwest lies the royal bedroom. A doorway in the north wall is the only other exit."}, "position": {"x": -240, "y": 1920}}, {"data": {"id": "kingst", "name": "King's study.", "description": "You are stood in the room the dwarfen king uses for much of his work. A hollow cut out into the wall is obviously used for a desk, and it is built with comfort and practicality in mind. The throne room is easily accessed to the west, and there is a low passage to the south. North is a doorway, of exceptionally old oak, well-tended and polished."}, "position": {"x": 0, "y": 1920}}, {"data": {"id": "kdorm", "name": "Children's dormitory.", "description": "This is the room where the young dwarfs sleep. The walls are decorated in pictures of bunnies and pussies, and give the room a soft, dreamy effect. The parents' dormitory is to the east, and to the north is a door."}, "position": {"x": 240, "y": 1920}}, {"data": {"id": "pdorm", "name": "Married quarters.", "description": "You are stood in the room in which live the married dwarfs. The various sub-rooms are discretely curtained off from each other, although the curtains are of course firmly fixed down to prevent their being stolen. The dormitory of their young is to the west, and northwards is a low passage."}, "position": {"x": 480, "y": 1920}}, {"data": {"id": "kqdorm", "name": "Royal bedroom.", "description": "It is here that the dwarfen king and queen sleep. The room is furnished with the normal bedroom paraphenalia, all dwarf-sized however so not much good for you. The walls are a regal purple, and the floor is of a soft, mossy material. The only exit is to the throne room, northeast."}, "position": {"x": -480, "y": 2160}}, {"data": {"id": "ktreas", "name": "King's treasure chamber.", "description": "This room is built to house the crown jewels and other assorted treasures of the dwarfen realm. It is austere in itself, and the only way out is through a doorway to the west."}, "position": {"x": -240, "y": 2160}}, {"data": {"id": "lowps8", "name": "Low passage.", "description": "You are in a low passage, which curves from a study to the north to end in a doorway to the east."}, "position": {"x": 0, "y": 2160}}, {"data": {"id": "road2", "name": "Narrow road.", "description": "You are on a narrow east-west road with forest to the north and gorse scrub to the south."}, "position": {"x": 240, "y": 2160}}, {"data": {"id": "hall", "name": "Hall.", "description": "You are standing in an oddly shaped hall. To the south is a doorway, the east is an archway, and some dark forbidding stairs lead upwards to the southeast. Immediately to the west is a fitted wardrobe, and some eerie, granite steps to the southwest lead downwards to the cellar."}, "position": {"x": 1800, "y": 0}}, {"data": {"id": "lounge", "name": "Lounge.", "description": "This is the lounge. Around you are some pieces of elegant troll-hide furniture, although all the portable ones have long been stolen so there's no point in getting any... Ahead of you to the south is the dining area, and to the west is the hall. An archway to the east leads to the study."}, "position": {"x": 2160, "y": 0}}, {"data": {"id": "kitche", "name": "Kitchen.", "description": "Around you is all the usual paraphernalia that can found in a kitchen, although it is firmly fixed down so you can't take any of it away. The pantry is to the northwest, and a doorway to the hall is to the north. East is a small serving hatch through which you can see, if not move to, the dining room."}, "position": {"x": 1800, "y": 360}}, {"data": {"id": "dining", "name": "Dining area.", "description": "You are standing in the dining area of a long narrow room. To the north is the lounge, to the west is a serving hatch which, you surmise, leads to the kitchen (although it's too small to climb through). To the south are some french windows which open out over a pasture."}, "position": {"x": 2160, "y": 360}}, {"data": {"id": "landin", "name": "Upstairs landing.", "description": "You are standing on the upstairs landing. There are doorways in most directions, the stairs lead downwards and to the northwest."}, "position": {"x": 1800, "y": -240}}, {"data": {"id": "bdrm01", "name": "Large bedroom.", "description": "You are standing in a large bedroom. To the south is a window out of which, you can see a pleasant field with a stream flowing swiftly at the bottom of it. There is a doorway to the north."}, "position": {"x": 2160, "y": -480}}, {"data": {"id": "bdrm02", "name": "Main bedroom.", "description": "This is the main bedroom. There is a window to the north from which you can see the road that runs past the front of the cottage. The way out is south, onto the landing."}, "position": {"x": 2160, "y": -240}}, {"data": {"id": "bdrm03", "name": "Small bedroom.", "description": "The room appears to have been used as a nursery at some time as the walls are covered with pictures of elves and gnomes all smiling happily. There is a fitted cupboard to the southwest and the way out is to the northwest."}, "position": {"x": 1800, "y": -480}}, {"data": {"id": "bathrm", "name": "Bathroom.", "description": "The bathroom contains a toilet and a handbasin, and on the wall is a shelf with \"MEDICINES\" written on it. The bath was removed long ago, but the toilet and handbasin still look usable. The only exit is to the east."}, "position": {"x": 1800, "y": -720}}, {"data": {"id": "start", "name": "Narrow road between lands.", "description": "You are stood on a narrow road between The Land and whence you came. To the north and south are the small foothills of a pair of majestic mountains, with a large wall running round. To the west the road continues, where in the distance you can see a thatched cottage opposite an ancient cemetery. The way out is to the east, where a shroud of mist covers the secret pass by which you entered The Land."}, "position": {"x": 3000, "y": 1200}}, {"data": {"id": "track2", "name": "Beaten track.", "description": "You're on a rough east - west track with a dense forest to the north and pasture to the south."}, "position": {"x": 2640, "y": 1200}}, {"data": {"id": "track1", "name": "Beaten track near cliff.", "description": "You are at the end of a rough track. There is a dangerous cliff to the west marked \"Lovers' leap\"."}, "position": {"x": 2280, "y": 1200}}, {"data": {"id": "wfrst1", "name": "Dense forest.", "description": "You are wandering around in some dense forest. To the east can be seen the entrance to a misty graveyard."}, "position": {"x": 2640, "y": 840}}, {"data": {"id": "clffst", "name": "Dense forest.", "description": "You are wandering around in some dense forest, to the east of a perilous cliff."}, "position": {"x": 2280, "y": 840}}, {"data": {"id": "garden", "name": "Flower garden.", "description": "You are in a well-kept garden. There is an unexpectedly sweet smell here and you notice lots of flowers. To the east across a path there is more garden."}, "position": {"x": 3000, "y": 1560}}, {"data": {"id": "house", "name": "house", "description": "No description available."}, "position": {"x": 3000, "y": 1920}}, {"data": {"id": "wpstre", "name": "West pasture.", "description": "You are in comparatively pleasant pasture. To the south is a river, to the north a track. Eastwards the pasture is seen to continue, while to the northeast is the flower garden of a strange cottage. To the south flows a river."}, "position": {"x": 2640, "y": 1560}}, {"data": {"id": "epstre", "name": "East pasture.", "description": "Around you is a delightful pasture. To the south is a fast flowing stream. Further north and east you can see a woodman's hut and to the north is gorse scrub. Northwestwards you can see a strange, forbidding cottage, which you can enter via its french windows."}, "position": {"x": 3360, "y": 1560}}, {"data": {"id": "clifff", "name": "Cliff.", "description": "You are standing on the edge of a cliff surrounded by forest to the north and a river to the south. A chill wind blows up the unclimbable and unscaled heights. At the base of the cliff you can just make out the shapes of jagged rocks."}, "position": {"x": 2280, "y": 1560}}, {"data": {"id": "wfall", "name": "Waterfall.", "description": "Before you is an awe-inspiring sight; a waterfall plummets over a cliff and explodes in a dazzling crescendo of rainbow colour on the menacing rocks below."}, "position": {"x": 2280, "y": 1920}}, {"data": {"id": "river1", "name": "River.", "description": "You are on the bank of a fast flowing river with pasture to the north and forest to the south."}, "position": {"x": 2640, "y": 1920}}, {"data": {"id": "river2", "name": "River.", "description": "You are on the bank of a fast flowing river with pasture to the north and forest to the south."}, "position": {"x": 3000, "y": 2160}}, {"data": {"id": "rapids", "name": "Rapids.", "description": "You are on the bank of some dangerous rapids. Beyond them to the east the river goes underground; to the west it continues out of sight, and you can hear a thundering as of falling water from that direction. To the south can be seen (and smelled!) a fuming swamp, and southeast is a small pond."}, "position": {"x": 3360, "y": 2400}}, {"data": {"id": "sfrst1", "name": "Dense forest.", "description": "You are wandering around in some dense forest, to the southwest of a pleasant pasture, to the east of a perilous cliff and to the south of a thundering waterfall. To the southeast is a glade in the forest."}, "position": {"x": 2280, "y": 2160}}, {"data": {"id": "sfrst2", "name": "Dense forest.", "description": "You are wandering around in some dense forest, to the south of a pleasant pasture, and to the west of a fuming swamp. To the southwest the forest opens up onto a magical glade."}, "position": {"x": 2640, "y": 2400}}, {"data": {"id": "gorse", "name": "Gorse.", "description": "You are in a tangled mass of prickly gorse."}, "position": {"x": 3240, "y": 1440}}, {"data": {"id": "hut", "name": "Woodsman's hut.", "description": "The hut is obviously the home of a woodsman. There are various pieces of rude wooden furniture scattered about. On the walls are stuffed fish and birds, they appear old and are fixed firmly to the wall as if the owner has treasured them for a long time."}, "position": {"x": 3600, "y": 1560}}, {"data": {"id": "outhut", "name": "In front of hut.", "description": "You are standing in front of a ramshackle hut. Behind you is a field of gorse. Further on to the south you can see a fast flowing river. To the east you can see a range of mountains wreathed in mist and to the west is a small cottage."}, "position": {"x": 3600, "y": 1680}}, {"data": {"id": "cave", "name": "Cave.", "description": "This is a cave, wherein once dwelled a hermit in times long passed. Above is a huge mountain towering amongst the clouds, and outside can be seen a pasture, small cottage and a cemetery in the distance. At the east end of the cave is a small opening in the wall."}, "position": {"x": 3960, "y": 1920}}, {"data": {"id": "mfrst", "name": "Forest near mountains.", "description": "You are in dense forest at the base of some snow-capped mountains, wreathed in clouds. The foothills are so beautiful that you yearn to be able to climb them and lie eternally in dew drenched grass, with an air of inner peace and total tranquility. You realise, however, that this is silly!"}, "position": {"x": 3600, "y": 1200}}, {"data": {"id": "sea13", "name": "Sea.", "description": "You are out to sea, away from the coastline. All around, except in the southerly and easterly directions, the water is very rough, and it would take a much larger craft than yours to travel there safely. Far beyond a headland to the south you can see a ship wrecked on some vicious rocks, but there is nothing but tempestuous sea beyond the cliff to the north."}, "position": {"x": -1200, "y": 0}}, {"data": {"id": "sea11", "name": "Sea.", "description": "You are out at sea, next to the coastline. To the west, the sea looks still sailable, but northwards it gets rough. Eastwards is a jetty, which juts out into the waves from a beach beyond. To the south, the relative tranquility of these coastal waters continues."}, "position": {"x": -720, "y": 0}}, {"data": {"id": "sea12", "name": "Sea.", "description": "You are at sea, close to the coastline to the east. Northwards and northwestwards, the sea looks safe enough to navigate, and to the southwest there is a channel around a headland protruding from the coast. Elsewhere, however, it is rough and sailing there would probably deposit you in Davy Jones's locker..."}, "position": {"x": -1200, "y": 480}}, {"data": {"id": "beach4", "name": "Stony beach.", "description": "This is a beach covered in stones of irregular size. To the north the cliffs rise, forming a cove which cuts off the area, but southwards the beach continues. A railway line runs from the east, and to the west a jetty forces itself out into the waves. To the southeast and northeast, slopes rise up into dales."}, "position": {"x": -480, "y": 480}}, {"data": {"id": "beach3", "name": "Stony beach.", "description": "The beach upon which you are stood is covered in stones, a legacy of the days when mining material would fall from the skips of ore as they were loaded aboard merchantmen. To the north, the beach continues, and to the west is the sea. East is a slope covered in scrubs, which rises up to a dale. On
