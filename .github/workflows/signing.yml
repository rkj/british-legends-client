name: Sign Artifacts

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ] # Ensure the workflow runs for tags to trigger the release

jobs:
  sign-job:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write # 'write' is required for creating Releases
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview requests websockets

      - name: Build executable
        run: .\build.bat

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Setup Trusted Signing
        uses: azure/trusted-signing-action@v0.4.0
        with:
          trusted-signing-account-name: MUDClientSigningWestUS2
          endpoint: https://wus2.codesigning.azure.net/
          certificate-profile-name: NewPublicTrustProfile02
          files-folder: ./dist

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries
          path: ./dist/

      - name: Release Signed Artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./dist/BritishLegends.exe
