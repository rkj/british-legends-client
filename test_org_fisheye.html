h the blood from the sacrifices above. Steps lead down to the southwest.", "font": {"size": 14}}, {"id": "dtest1", "label": "dtest1\nSteps down.", "title": "As you go down, an axe swings out from above, but with a swish of your magic sword you deflect it to one side. The way from here is a downward climb, which you won't be able to climb back up, or the way you came from the steps to the northeast. The floor is carpeted in a heavy mist, so you cannot see your feet.", "font": {"size": 14}}, {"id": "dtest2", "label": "dtest2\nNiche room.", "title": "You start your descent, and the rocky walls change into clayy earth. Suddenly, a clod comes loose from a tricky section, and you fall back. With amazing speed you hook out with your sickle and it digs into the wall, saving you from falling. You get to the bottom safely. There is no exit, only a niche in the wall, to put things into. The floor is covered in mist.", "font": {"size": 14}}, {"id": "dtest3", "label": "dtest3\nDruid room.", "title": "This most ancient of rooms is the old temple of the druids who once lived upon this island. It is bare, the druids having taken their paraphenalia with them when they fled The Land. Written onto the wall in blue daub reads, \"With the fork of gold eat the sprig of pearls.\" There is a doorway to the north, and no apparent light source although the room is illuminated.", "font": {"size": 14}}, {"id": "dtreas", "label": "dtreas\nDruidical treasure chamber.", "title": "The room in which you find yourself is the most wonderous you have ever glimpsed, its walls impregnated with starstones and the air thickly scented with the drowsy aromatic sweetness of mistletoe. The way out is via a rectangular hole in the roof.", "font": {"size": 14}}, {"id": "dead20", "label": "dead20\nAn unseen strong current suddenly drags hold of your little craft and", "title": "sucks it underwater. You splash about, but eventually drown. Sigh.", "font": {"size": 14}}, {"id": "vrocks", "label": "vrocks\nVicious rocks.", "title": "You are landed by some vicious rocks out at sea. A strong current flows past at alarming speed round the tattered, half-submerged wreckage of a galleon stuck forlornly on them. You can cross to the deck of the ship by going northwards, but its front half is underwater. To the east in the distance can be seen a beach and cliff. Quite a way to the south there looks to be a small island, dominated by a huge archway which stands astride it.", "font": {"size": 14}}, {"id": "deck", "label": "deck\nDeck.", "title": "You are stood on the deck of a wrecked galleon. To the south are some vicious rocks. Upwards, the main mast, still unbroken, leads to the crow's nest; to the east are steps to the poop deck, and to the northeast is the Captain's cabin. Downwards is the hold.", "font": {"size": 14}}, {"id": "crow", "label": "crow\nCrow's nest.", "title": "You are perched in the crow's nest, high above the sea where it juts out from the deck below. Far, far to the northwest can be glimpsed a mysterious island, and to the east over the sea are cliffs.", "font": {"size": 14}}, {"id": "stpoop", "label": "stpoop\nSteps.", "title": "You are on some shakey steps leading from the deck upwards to the poop.", "font": {"size": 14}}, {"id": "poop", "label": "poop\nPoop deck.", "title": "You are on the poop deck of the wrecked galleon. Westwards, steps lead down to the deck. The wheel of the ship is stiffened and will not move an inch. A name carved into it reads, \"H.M.S. Essex\".", "font": {"size": 14}}, {"id": "capt", "label": "capt\nCaptain's cabin.", "title": "This cabin was once occupied by the captain of the ship. Most of the contents have been washed away, and all that remains is driftwood. To the southwest is an opening leading to the deck, and a hole in the floor leads downwards to the galley.", "font": {"size": 14}}, {"id": "galley", "label": "galley\nGalley.", "title": "This used to be the kitchen of the galleon, but all the utensils have been washed away. A hole in the floor leads to the powder room, and one in the roof leads to the captain's cabin.", "font": {"size": 14}}, {"id": "proom", "label": "proom\nPowder room.", "title": "The smell of sulphur fills the air as you look around you in the storage place for gunpowder. Most of the kegs have been broken by the elements, and are now useless. There was a way down but it is flooded. Upwards is an opening in the ceiling to the galley.", "font": {"size": 14}}, {"id": "hold", "label": "hold\nHold.", "title": "This is what remains of the hold which is unflooded. The walls are stained black with the pitch used for waterproofing. The only exit is upwards to the deck.", "font": {"size": 14}}, {"id": "dead23", "label": "dead23\nYou enter the powder room, and smell sulphurous fumes just before", "title": "igniting the powder ingrained in the wooden walls, and blowing yourself to kingdom come. At least you went with a bang!", "font": {"size": 14}}, {"id": "bwfall", "label": "bwfall\nBehind waterfall.", "title": "You are in a small room behind a thundering waterfall. Above and around you is a mighty cliff, and the walls of the cave glitter as they catch the fractured light from outside. A spiral staircase to the east leads upwards into the rock.", "font": {"size": 14}}, {"id": "spiral", "label": "spiral\nSpiral staircase.", "title": "This is a spiral staircase, carved into the rock. Above, the steps stop and a vertical section of steps follows. Below can be heard a thundering crescendo of noise, and the sea can be smelled.", "font": {"size": 14}}, {"id": "vert", "label": "vert\nVertical staircase.", "title": "This is a tight vertical climb, the steps hewn into the rocks in a ladder-like arrangement. Above is a small room whence a hum ensues, and below is a spiral staircase leading downwards.", "font": {"size": 14}}, {"id": "revrm", "label": "revrm\nReverberating room.", "title": "The walls around you in this small, oval room are humming as the crashing of the waterfall outside resonates through the cliff. The way out is a vertical climb leading downwards to the west, and another passage runs northwards on the same level.", "font": {"size": 14}}, {"id": "revps", "label": "revps\nReverberating passage.", "title": "This passage also reverberates with the crashing of the waterfall outside, but not so much as the reverberating room to the south. Light comes from an opening onto a room to the north.", "font": {"size": 14}}, {"id": "grotto", "label": "grotto\nGrotto.", "title": "This is a grotto, high up in the cliffs, but concealed from the beach by an overhang. Out to sea can be seen a wrecked ship, tossed by some fearful storm onto a pincushion of vicious rocks. Above is the cliff.", "font": {"size": 14}}, {"id": "fossrm", "label": "fossrm\nFossil room.", "title": "This ancient room has not been visited in centuries until this day. Its walls are studded with ancient fossils of creatues belonging to a bygone era. An eerie sense of awe and wonder permeates the timeless cave.", "font": {"size": 14}}, {"id": "fortun", "label": "fortun\nForbidding tunnel.", "title": "You are in a forbidding tunnel underneath a mighty cliff. Light comes from the western end, from which can also be heard the sound of the sea. At the eastern end the rock becomes harder and the sea has not eroded it. However, there are support braces for a heavy iron grate there, in the roof.", "font": {"size": 14}}, {"id": "smuggl", "label": "smuggl\nSmugglers' cave.", "title": "The irregularily-shaped room in which you find yourself is an old cave, initially opened up by the sea but since enlarged upon by man. Years ago, it was used as a hiding place by smugglers. In the floor is a heavy iron grate, and below is a forbidding tunnel.", "font": {"size": 14}}, {"id": "oglair", "label": "oglair\nOgre's lair.", "title": "This is a large room used as a home by an ogre. The floor is littered with the bones of the dead, licked clean by the monster. A dark passage exits to the north, and there is a small opening to the south. The smell in the room is reminiscent of animals, and of the grave...", "font": {"size": 14}}, {"id": "ydead8", "label": "ydead8\nThe ogre picks up his club and pounds you into the ground.", "title": "", "font": {"size": 14}}, {"id": "leprm", "label": "leprm\nLeprechaun room.", "title": "This is a small but pretty room owned by a leprechaun. The furniture and ornaments are much too small to be of use to a human, however. The only way out is to the north, whence a rotting smell ensues.", "font": {"size": 14}}, {"id": "befidl", "label": "befidl\n", "title": "", "font": {"size": 14}}, {"id": "yrdead", "label": "yrdead\nYou are splattered over a very large area, or at least most of you", "title": "is. The rest of your remains are, even now, being eaten by the seagulls (especially your eyes). If you'd have looked properly before you leaped you might have decided not to jump!", "font": {"size": 14}}, {"id": "outhut", "label": "outhut\nIn front of hut.", "title": "You are standing in front of a ramshackle hut. Behind you is a field of gorse. Further on to the south you can see a fast flowing river. To the east you can see a range of mountains wreathed in mist and to the west is a small cottage.", "font": {"size": 14}}, {"id": "root", "label": "root\nRoot room.", "title": "You are in a room of tangled yew roots. There appears to be a passable gap to the north from whence emanates a dim light; to the south has been hewn a smooth tunnel. Light comes from a hollow tree stump above.", "font": {"size": 14}}, {"id": "rtun1", "label": "rtun1\nRoot tunnel.", "title": "You are in an underground tunnel, with dry roots hanging from the walls, and littering the floor. As you walk, you feel the twigs snapping under your feet. The tunnel runs north to south, with a dim light coming from the northern end, and a room of roots to the south.", "font": {"size": 14}}, {"id": "rtun2", "label": "rtun2\nNorthern part of root tunnel.", "title": "You are in the northern part of a subterranean tunnel, its walls and ceiling a mass of dangling, dry root from the tree above. There is a dim light to the north, where the tunnel opens up. To the south, the tunnel continues.", "font": {"size": 14}}, {"id": "ydead1", "label": "ydead1\nAs you push your way through the hanging roots, the tinder dry wood", "title": "catches fire from your burning torch. The flames leap rapidly from root to root, and soon you are surrounded by a raging fire. You feel your body charring as you fall to the ground in utter agony...", "font": {"size": 14}}, {"id": "dead10", "label": "dead10\nWhen you drop your torch, the tinder dry wood ignites from the", "title": "flame and an instant later you are burned to a frazzle as the sparks flash across the roots. Serves you right for playing with fire...", "font": {"size": 14}}, {"id": "altar", "label": "altar\nSacred room.", "title": "You are standing in a room faced with smooth marble. The central feature is a large, immobile block, out of which springs a tall flame, throwing the empty corners of the room into vague, flickering shadow. To the east is a dark tunnel, and to the south the only other entrance.", "font": {"size": 14}}, {"id": "antech", "label": "antech\nAnte chamber.", "title": "You are standing in a small chamber carved out of the earth. To the west is a tunnel, out of which emanates a dim glow. A mysterious doorway is to the east, painted in a deep crimson colour.", "font": {"size": 14}}, {"id": "hchamb", "label": "hchamb\nHallowed chamber.", "title": "This is a sanctified, hallowed chamber, set off from the main temple by an opening to the south. A faint smell of bitter incense still hangs silently in the cold air. Most of the treasures which were once to be found here have been stolen.", "font": {"size": 14}}, {"id": "temple", "label": "temple\nTemple.", "title": "You are in a silent, sinister temple, its walls and a doorway to the west painted in a deep crimson colour. The scent of stale incense still lingers on, although the temple has remained unused for some time and most of its trappings have been removed. A sliding chute leads down to here from the east, but it is impossible to ascend. In the north wall is an opening to a small chamber.", "font": {"size": 14}}, {"id": "tunnel", "label": "tunnel\nEarth tunnel.", "title": "Before you is a convoluted earth tunnel. It seems to have been made by a gang of cheery dwarves. Then again it might not have been. The only exits appear to be to the north and southeast.", "font": {"size": 14}}, {"id": "lgrm", "label": "lgrm\nLarge room.", "title": "This is a very large room, at least 60 feet in diameter and some 20 feet high. There are no apparent doors, but the walls are so full of nooks and crannies that you might be able to go in any direction if you tried. The only obvious exit is to the northwest.", "font": {"size": 14}}, {"id": "wolfrm", "label": "wolfrm\nWolf room.", "title": "The evil stench of death hangs heavy on the wind in this most noxious of rooms. The walls and floor are coated with the crusted excrement of some massive hound, including the bones of brave men, licked clean in some ghastly display of macabre carnage. There is an exit to the west, and a deathly passage leading down...", "font": {"size": 14}}, {"id": "deathp", "label": "deathp\nDeathly passage.", "title": "This passage carries the scent of death, as it slants down from the west to deep underground at the east. A stream of dried blood meanders from the room at the top, and at the bottom the passage levels off.", "font": {"size": 14}}, {"id": "cinder", "label": "cinder\nCindered room.", "title": "The floor on which you stand is deep in cinders, and its walls are blackened with soot from some incredible fire which must have once raged here in some lost time. The walls beneath the soot are glass-like, fused together by the radiant energy of the inferno. To the west is a passage leading upwards, and to the east a strange portal...", "font": {"size": 14}}, {"id": "diamnd", "label": "diamnd\nDiamond room.", "title": "When you enter the room, you feel a sudden sense of change around you, although you cannot pinpoint the exact reason behind the instinct. You soon forget this, however, as your eyes catch sight of the floor: it is studded with diamonds! You leap down to pick them up, but most are solidly fused in place. Looking around you, you see a deathly passage sloping upwards to the west, and a strange doorway to the east...", "font": {"size": 14}}, {"id": "firept", "label": "firept\nFiery pit.", "title": "A narrow ledge here is the only safe place to tread, as a bubbling pit of fiery tar and sulphur is on either side. The only exit is to the west, into a passage still heated by the flames from the pit. Breathing is difficult, but you can still get enough oxygen, albeit with discomfort.", "font": {"size": 14}}, {"id": "estlpl", "label": "estlpl\nEast side of still pool room.", "title": "You are in a vaguely circular room with a high ceiling. The way west is interposed by a large pool, but east is a hole in the wall.", "font": {"size": 14}}, {"id": "wstlpl", "label": "wstlpl\nWest side of still pool room.", "title": "You are on the west side of the still pool room. There appear to be no exits.", "font": {"size": 14}}, {"id": "tombrm", "label": "tombrm\nTomb room.", "title": "Above you, a set of narrow stairs lead upwards out of the tomb. To the south is a scraped-out passage, above which is scrawled in crimson, \"EMERALD AND RED HAVE VALUE\". The rest of the walls appear devoid of any markings and there appears to be no other exit apart from the passage to the south.", "font": {"size": 14}}, {"id": "rottrm", "label": "rottrm\nRotting room.", "title": "You are in a room of badly hollowed-out earth. The floor is littered with rotting debris as if some evil feast of saphrophitic carnage had been interrupted by your arrival. The only ways out from this foul-smelling hole seem to be to the west and north.", "font": {"size": 14}}, {"id": "cavein", "label": "cavein\nCaved-in grave.", "title": "You are underneath a caved-in grave, although there is no way up to the surface from here. Most of the corpse from the grave appears to have been devoured so perhaps the cave-in was no accident... To the west is a small chute which leads downwards, but you won't be able to come back if you take it, or carry anything with you.", "font": {"size": 14}}, {"id": "befgte", "label": "befgte\nBefore Gate.", "title": "You are standing in front of a huge oaken gate, rotted through over the ages so passage is easy. To the north is a narrow ledge over a deep pit, and to the south a dark passage whence drifts the scent of animals. The scene is visible by light beyond a smallish hole in the west wall. You can travel through the gate, to the east.", "font": {"size": 14}}, {"id": "bef1", "label": "bef1\nBefore idol.", "title": "You are stood in front of a huge idol of a cyclops, hewn into the rock face and towering above you. To the west is a large doorway but the door has long since rotted away. Stairs run up the side of the idol to an opening at the mouth, and beyond. To the north is a small opening.", "font": {"size": 14}}, {"id": "crypt", "label": "crypt\nAncient crypt.", "title": "As you crawl out through the room, a sense of reverence comes over you, for you find you are in a crypt. It has obviously not been entered for a long time, and is stark and sparse save for a marble block in the centre of the room, which is immobile.", "font": {"size": 14}}, {"id": "ydead5", "label": "ydead5\nAs you leap, you suddenly realise that you are about to be splattered", "title": "all over the floor. Sure enough, you are.", "font": {"size": 14}}, {"id": "ydead4", "label": "ydead4\nAs you start to cross the narrow ledge, the ox, nervous because of the", "title": "tremendous drop, is reluctant to follow and gives you a nudge with its nose. You are knocked off balance and plummet downwards, breaking into little pieces when you finally hit the bottom.", "font": {"size": 14}}, {"id": "saltar", "label": "saltar\nSmall altar room.", "title": "You are in a small room with an altar in front of you. Apart from the narrow ledge there is no way out.", "font": {"size": 14}}, {"id": "mthidl", "label": "mthidl\nOutside mouth of idol.", "title": "You are stood by the mouth of a large and ancient idol of a cyclops. To the west, lower down, can be seen a tall but rotted gate. Above are the nose and eye of the colossus.", "font": {"size": 14}}, {"id": "inmth", "label": "inmth\nInside mouth of idol.", "title": "You are stood in the opening at the mouth of the idol. The walls are blacked with the incense of ages passed. An opening to the east leads deeper into the rock, whereas the mouth of the idol is to the west.", "font": {"size": 14}}, {"id": "hollow", "label": "hollow\nHollowed-out passage.", "title": "This is an east-west passage, carved through the granite of the mountain. At the west end is an opening to a small room, and at the east a junction with some roughly hewn steps going downwards, and the rest of the passage. The steps downwards curve away to the left.", "font": {"size": 14}}, {"id": "rsteps", "label": "rsteps\nRoughly hewn steps.", "title": "You are on a spiral staircase, curving downwards into the bowels of the mountain. The walls are solid rock, and the staircase is narrow.", "font": {"size": 14}}, {"id": "Rockps", "label": "Rockps\nRock passage.", "title": "This is a passage carved into the rock, running east-west. At the west end the passage continues, and makes a junction with some steps leading downwards. At the east end the passage opens into a chamber of some description.", "font": {"size": 14}}, {"id": "chambr", "label": "chambr\nAncient chamber.", "title": "This is a ghostly chamber, its aged walls decorated with strange glyphs and ancient runes which you cannot understand. To the west is an opening to a passage. The eerie shadows cast by your light add to the feeling of time and wonder you sense around you.", "font": {"size": 14}}, {"id": "uland1", "label": "uland1\nStaircase landing.", "title": "You are stood in a small open area, which makes a junction a spiral staircase leading both up and down. The steps down are much more worn than those up, and the landing shows signs of recent use. To the north is a battle-scarred oaken doorway.", "font": {"size": 14}}, {"id": "guadrm", "label": "guadrm\nGuard room.", "title": "You are in a plain room of sanded granite, with seats set into the wall which are well worn. To the south is an oaken doorway.", "font": {"size": 14}}, {"id": "wstep1", "label": "wstep1\nWorn steps.", "title": "You are on a worn spiral staircase leading both up and down.", "font": {"size": 14}}, {"id": "wstep2", "label": "wstep2\nWorn steps.", "title": "You are on a worn spiral staircase leading both up and down.", "font": {"size": 14}}, {"id": "wstep3", "label": "wstep3\nWorn steps.", "title": "You are on a worn spiral staircase leading both up and down.", "font": {"size": 14}}, {"id": "uland2", "label": "uland2\nBottom of worn steps.", "title": "You have reached the bottom of some worn steps, and find yourself in a roughly-made room. The steps lead upwards, and to the west is an exit to a natural cavern.", "font": {"size": 14}}, {"id": "natcav", "label": "natcav\nNatural Cavern.", "title": "This is a large natural cavern, caused by fissures in the rocks eons ago. There is a well-worn path leading east-west, although the cavern is bedded with granite. At the east end are steps to a landing; at the west the cavern joins a north-south passage.", "font": {"size": 14}}, {"id": "passg1", "label": "passg1\nPassage.", "title": "You are in a narrow, north-south passage which continues in both directions. To the west is a doorway, and to the east is an entrance to a natural cavern.", "font": {"size": 14}}, {"id": "passg2", "label": "passg2\nPassage.", "title": "This is a narrow north-south passage. At the north end is a doorway, and to the south the passage continues.", "font": {"size": 14}}, {"id": "passg3", "label": "passg3\nPassage.", "title": "This is a narrow north-south passage. At the south end is a doorway, and to the north the passage continues.", "font": {"size": 14}}, {"id": "passg4", "label": "passg4\nPassage.", "title": "This is a narrow east-west passage. At the east end is a doorway, at the west an opening to a room.", "font": {"size": 14}}, {"id": "passg5", "label": "passg5\nPassage.", "title": "This is a narrow east-west passage. At the east end is a doorway, at the west an opening to a room.", "font": {"size": 14}}, {"id": "passg6", "label": "passg6\nPassage.", "title": "You are in a narrow north-south passage. At the south end is a doorway, at the north an opening to a room.", "font": {"size": 14}}, {"id": "passg7", "label": "passg7\nPassage.", "title": "You are in a narrow north-south passage, opening to a room at either end.", "font": {"size": 14}}, {"id": "passg8", "label": "passg8\nPassage.", "title": "This is a narrow east-west passage, with a doorway at the west and and an opening to a room at the east.", "font": {"size": 14}}, {"id": "passg9", "label": "passg9\nPassage.", "title": "You are in a narrow east-west passage. To the east are steps leading upwards, and to the west the passage curves away to the left as you look at it. In the north wall is a doorway.", "font": {"size": 14}}, {"id": "pass10", "label": "pass10\nPassage.", "title": "This is a narrow stretch of passage running east-west. At the east end it joins a crooked passage, and at the west it stops. There is an opening in the north wall at the west end leading to a long passage, and one in the south wall at the west end leading into a room.", "font": {"size": 14}}, {"id": "gob1", "label": "gob1\nGoblin lair.", "title": "This is a filthy room, vaguely square, with a doorway in the south wall and an opening to a passage in the west.", "font": {"size": 14}}, {"id": "gob2", "label": "gob2\nGoblin lair.", "title": "This is a filthy room, roughly square-shaped, with a doorway on the west wall and openings to passages in the north, east and south.", "font": {"size": 14}}, {"id": "gob3", "label": "gob3\nGoblin lair.", "title": "This dirty room is roughly square-shaped, with a doorway on the north wall and an opening to a passage on the east.", "font": {"size": 14}}, {"id": "gob4", "label": "gob4\nGoblin lair.", "title": "This is an unclean room, rectangular in shape, with an opening to the south and a doorway to the north. There doesn't appear to be any way of opening or unlocking the door from this side.", "font": {"size": 14}}, {"id": "gob5", "label": "gob5\nGoblin lair.", "title": "This disgusting room is square-shaped. In the east wall is a doorway, and to the south is an opening to a passage. There is a steep chute in the north wall, leading down, but if taken you won't be able to get back up through it.", "font": {"size": 14}}, {"id": "treasc", "label": "treasc\nTreasure chamber.", "title": "You find yourself in a room decked out in all manner of fabulous valuables hoarded by the goblins over the years. Most of them, however, are fabulous only in the eyes of goblins and there mightn't be any you'd consider as treasure yourself. To the south in this room is a doorway, and there is also a chute leading upwards, but it's impossible to ascend.", "font": {"size": 14}}, {"id": "ewstep", "label": "ewstep\nEast-west steps.", "title": "You are on a staircase running down to the west and up to the east. At the top is a room, at the bottom a passage.", "font": {"size": 14}}, {"id": "curve", "label": "curve\nCurved passage.", "title": "This is a semi-circular passage, which bends to the east onto a passage at the north end, and to the northeast onto a diagonal passage at the southernmost end. If looked at from above, with north at the top and south at the bottom, it could be described as the left half of a circle.", "font": {"size": 14}}, {"id": "diagps", "label": "diagps\nDiagonal passage.", "title": "This is a narrow passage, running diagonally from the southwest to the northeast. At the southwest end, it comes onto a passage which curves away to the right, and at the northeast end is space for a vertically sliding panel.", "font": {"size": 14}}, {"id": "spanel", "label": "spanel\nSliding panel room.", "title": "In this room you find space for a vertically sliding panel in the east wall, but apart from that there are no interesting features. The only exit is to the west where steps lead downwards. The place where the panel goes has solid rock behind it.", "font": {"size": 14}}, {"id": "bluerm", "label": "bluerm\nBlue room.", "title": "This is a smallish room, painted in a bright royal blue for some reason, from the ceiling to the floor. The way out is to the southwest, behind where a vertically sliding panel is obviously intended to go.", "font": {"size": 14}}, {"id": "longps", "label": "longps\nLong passage.", "title": "You are in a long, narrow, north-south passage. At the north end it goes into a room, at the south it joins a crooked passage running east-west.", "font": {"size": 14}}, {"id": "crookp", "label": "crookp\nCrooked passage.", "title": "This is a crooked passage running essentially east-west. At the west end it straightens out, and at the east are narrow steps leading down. There is an opening in the north wall leading onto a long passage.", "font": {"size": 14}}, {"id": "nstep1", "label": "nstep1\nNarrow steps.", "title": "You are on some narrow steps, running a long way downwards from west to east.", "font": {"size": 14}}, {"id": "nstep2", "label": "nstep2\nNarrow steps.", "title": "You are on some narrow steps, running up from east to west. The steps are old, and look rarely used.", "font": {"size": 14}}, {"id": "nstep3", "label": "nstep3\nNarrow steps.", "title": "You are on some narrow steps, running up from east to west. The steps are old, and look rarely used.", "font": {"size": 14}}, {"id": "uland3", "label": "uland3\nBottom of stairs.", "title": "You are in a small landing, deep in the bowels of the earth. The only way out looks to be by some steps at the west end which run upwards. In the northwest corner of this oval-shaped room is a widish, polished chute, but it runs upwards and is slippery, so you cannot take it. Don't know why I bothered mentioning it, actually!", "font": {"size": 14}}, {"id": "lsp1", "label": "lsp1\nLong sloping passage.", "title": "This is a long, sloping passage, running from the south upwards to the north, with openings at both ends.", "font": {"size": 14}}, {"id": "lsp2", "label": "lsp2\nLong sloping passage.", "title": "This is a long, sloping passage, running from the south upwards to the north, with openings at both ends.", "font": {"size": 14}}, {"id": "lsp3", "label": "lsp3\nLong sloping passage.", "title": "This is a long, sloping passage, running from the south upwards to the north, where can be seen a dim light.", "font": {"size": 14}}, {"id": "river3", "label": "river3\nUnderground river.", "title": "You are on the banks of a fast-flowing river. High above is an opening in the mountain, whence comes daylight, but it is impossible to reach it. The river flows east-west, but underground at either end so you cannot follow it. There is a slight bank to the north of you, and a passage sloping downwards to the south.", "font": {"size": 14}}, {"id": "nbank", "label": "nbank\nNorth bank of underground river.", "title": "This is the north bank of the river, and is slightly muddy but not bad enough to make you slip. Light comes from the opening high above.", "font": {"size": 14}}, {"id": "cannrm", "label": "cannrm\nCannon room.", "title": "You are in a square-shaped room. To the north is an opening onto a passage, and to the south is a doorway. In the room, facing the doorway, is an old ship's cannon.", "font": {"size": 14}}, {"id": "fowrm", "label": "fowrm\nFountain room.", "title": "An unmistakable sense of magic pervades this small room. In one corner is a marvellous fountain, sprinkling sparkling water 6 feet into the air. To the north is an opening to a larger room, but there are no other exits.", "font": {"size": 14}}, {"id": "eyedol", "label": "eyedol\nNose and eye of idol.", "title": "You are at the top of the idol. The stairs go no further.", "font": {"size": 14}}, {"id": "attic", "label": "attic\nAttic.", "title": "This is attic, or the loft. Dust of ages past lies here, barely disturbed for generations. The thatched roof of the cottage adds to the generally musty smell, and sense of mystery and excitement. You can see because a thinning section of thatch lets the light in.", "font": {"size": 14}}, {"id": "cuptop", "label": "cuptop\nTop of cupboard.", "title": "You are stood at the top of the ladder in the cupboard. The walls are old and the plaster is cracking, especially at the join with the cupboard's ceiling. The ladder is very firm and steady.", "font": {"size": 14}}, {"id": "dead11", "label": "dead11\nThe cupboard is very small, and as you ascend the ladder you suddenly", "title": "realise that you are running out of air! Try as you might, you cannot break your way out of the place, although you bash at all the walls, and the ceiling and floor. Eventually you suffocate. Now you know how the scratch marks on the wall were made!", "font": {"size": 14}}, {"id": "laddrm", "label": "laddrm\nLadder Shaft.", "title": "You are on a ladder, halfway between a hut and an underground room dug into the earth. The inside of the hut can be observed through holes in the floorboard, and it appears to have walls decorated with animal trophies and other assorted items.", "font": {"size": 14}}, {"id": "uhut", "label": "uhut\nUnderground Room.", "title": "This is an underground room, once used as a den by some forester, perhaps. Its floor is covered with a soft moss, and it is surprisingly comfortable, with evidence of once having an easy chair, and a fire underneath a shaft (for ventilation). The shaft leads upwards and contains a ladder affixed to the walls. To the west is a very small tunnel, which you can squeeze into but won't be able to turn in.", "font": {"size": 14}}, {"id": "stun1", "label": "stun1\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the north to the east.", "font": {"size": 14}}, {"id": "stun2", "label": "stun2\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the west to the south.", "font": {"size": 14}}, {"id": "stun3", "label": "stun3\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the northwest to the east.", "font": {"size": 14}}, {"id": "stun4", "label": "stun4\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the south to the southeast.", "font": {"size": 14}}, {"id": "stun5", "label": "stun5\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the southwest to the north.", "font": {"size": 14}}, {"id": "stun6", "label": "stun6\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the northwest to the northeast.", "font": {"size": 14}}, {"id": "stun7", "label": "stun7\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the west to the southeast.", "font": {"size": 14}}, {"id": "stun8", "label": "stun8\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the north to the east.", "font": {"size": 14}}, {"id": "stun9", "label": "stun9\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the northwest to the south.", "font": {"size": 14}}, {"id": "stun10", "label": "stun10\nSmall tunnel.", "title": "You are in a small, claustrophobic, earthen tunnel, curving from the north to the southeast.", "font": {"size": 14}}, {"id": "dsteps", "label": "dsteps\nSteps to cellar.", "title": "You are on some granite steps leading downwards to the cellar. There is a hallway above to the northeast, and below is a dank cellar.", "font": {"size": 14}}, {"id": "cellar", "label": "cellar\nCellar.", "title": "This is a dank, murky cellar, its granite-faced walls stained with mould and dust. Upwards to the northeast are steps, whence comes light enough to see by. To the south is a crack in the wall, leading to a small, earthen tunnel, although it looks very cramped and you might not be able to turn round and come back were you to enter it. To the west is the doorway to the coal bunker.", "font": {"size": 14}}, {"id": "dead15", "label": "dead15\nAs you attempt to move in a direction other than along the passage,", "title": "the soft earthen wall starts to crumble. You try to pack it back, but the effect increases until the whole tunnel is falling about your ears. Desperately, you claw your way through the disintigrating passage, but the roof caves down and you are trapped, buried alive under the huge weight of soil. A terrible way to go...", "font": {"size": 14}}, {"id": "dead16", "label": "dead16\nYou smash yourself into the rocks below and are consequently killed.", "title": "", "font": {"size": 14}}, {"id": "sloptn", "label": "sloptn\nSloping tunnel.", "title": "This is a small tunnel sloping from the north down to the south. Its walls are earthy but hardened, and only about two feet apart.", "font": {"size": 14}}, {"id": "level", "label": "level\nLevel room.", "title": "The floor of this square-shaped room lies on bedrock, and has been chiselled painstakingly so as to be perfectly level. To the north is a narrow passage, sloping upwards, and to the south is a short flight of steps leading down to a muddy room.", "font": {"size": 14}}, {"id": "mudrm", "label": "mudrm\nMud room.", "title": "In this room, a large amount of reddish mud lies on the floor. The floor is otherwise of unchiselled bedrock. A short flight of steps to the north leads upwards into a square room with a level floor.", "font": {"size": 14}}, {"id": "schamb", "label": "schamb\nSmall chamber.", "title": "You are in a small chamber with dry, earthy walls. The only exit is to the west where you can see a room, its floor is deep in reddish mud.", "font": {"size": 14}}, {"id": "hotpas", "label": "hotpas\nHot passage.", "title": "You are in a hot passage running east-west. At the west end is a strange doorway, and at the east is a fiery pit, which makes the atmosphere clammy, and thick with sulphurous fumes.", "font": {"size": 14}}, {"id": "dead19", "label": "dead19\nKingdom come.", "title": "You find yourself blown to kingdom come. Not really the ideal place to spend the rest of your life, especially when you're dead. Next time you'll know to put a fuse in and blast with the keg instead of trying to burn it...", "font": {"size": 14}}, {"id": "dead27", "label": "dead27\nThe ox, afraid of the thundering waterfall, nudges you with its snout", "title": "as you walk under. You trip, and are drowned by the waters, held underneath the surface by the falling torrent. Glug glug.", "font": {"size": 14}}, {"id": "dead28", "label": "dead28\nThe die comes up one. For an instant, it seems to glow a hellish red,", "title": "then there is an ear-splitting crack, as if the very fabric of the universe had been rent. The die explodes into uncountable shards, and you are killed by the blast. The goddess of luck must really dislike you...", "font": {"size": 14}}, {"id": "dead29", "label": "dead29\nMistletoe is poisonous, simpleton! Don't you know ANYTHING?", "title": "", "font": {"size": 14}}, {"id": "dead30", "label": "dead30\nYou try to set sail, but the seas are much rougher than you had", "title": "anticipated. Desperately, you try to make your way back to the shore, realising that death is inevitable. You are right, and inevitably die.", "font": {"size": 14}}, {"id": "dead31", "label": "dead31\nOff you jump, safe in the knowledge that your pseudo-parachute will", "title": "save you from certain death. Unfortunately, the strong winds coming off the sea blow it out of your hands! Guess what happens next..?", "font": {"size": 14}}, {"id": "dead33", "label": "dead33\nYou poison yourself, simpleton.", "title": "", "font": {"size": 14}}, {"id": "dead34", "label": "dead34\nYou start to move, and suddenly the squirrels start acting very", "title": "viciously. They scamper about you scratching and clawing, then, as one, they leap at you and start gnawing at your flesh with their sharp incisors. You try to beat them off, but they are too many and are incensed by something into a maddened rage. Eventually you are torn to pieces. I wonder what it is you did? Or didn't do?", "font": {"size": 14}}, {"id": "dead37", "label": "dead37\n>-KABOOM-<", "title": "", "font": {"size": 14}}, {"id": "dead39", "label": "dead39\nYou walk out of the coal bunker, but the coal dust by the door ignites", "title": "from your brand, and an instant later you find you aren't.", "font": {"size": 14}}, {"id": "dead40", "label": "dead40\nAll of a sudden the lit torch you are carrying sets fire to your boat,", "title": "and within seconds the wood is in flames. You look about in horror as your little craft burns to nothing before your very eyes. Glug glug () glug ().", "font": {"size": 14}}, {"id": "dead41", "label": "dead41\nAll of a sudden, from out of nowhere, comes a wall of water, crashing", "title": "towards you with immense power! You are hopelessly trapped, and although you try your best you've no time to react. To cut a long story short, you get buffeted against the floor and pounded to death. And if you'd have survived that you'd have drowned, too...", "font": {"size": 14}}, {"id": "dead43", "label": "dead43\nYou leap off, hoping that for some reason you won't kill yourself", "title": "when you land. Where you got that idea from I'll NEVER know...", "font": {"size": 14}}, {"id": "home", "label": "home\nUnknown Room", "title": "", "font": {"size": 14}}, {"id": "store", "label": "store\nUnknown Room", "title": "", "font": {"size": 14}}, {"id": "limbo", "label": "limbo\nUnknown Room", "title": "", "font": {"size": 14}}, {"id": "xmasbx", "label": "xmasbx\nUnknown Room", "title": "", "font": {"size": 14}}, {"id": "rockps", "label": "rockps\nUnknown Room", "title": "", "font": {"size": 14}}]);

            layout: {

                    nodeSpacing: 250,
                    levelSeparation: 200
                }
            },
            physics: { enabled: false }
        };
        var network = new vis.Network(container, data, options);

        function updateFisheye() {
            var center = network.getViewPosition();
            var allNodes = nodes.get();
            var updates = [];
            var posDict = network.getPositions(); // Very fast, gets all current positions
            
            for (var i = 0; i < allNodes.length; i++) {
                var node = allNodes[i];
                var pos = posDict[node.id];
                if (!pos) continue;
                
                var dx = pos.x - center.x;
                var dy = pos.y - center.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                
                var scale = 1;
                if (dist < 400) {
                    scale = 1 + (2.0 * (1 - (dist / 400))); // Max 3.0 scale at dead center
                }
                
                var newSize = Math.round(14 * scale);
                if (node._currentSize !== newSize) {
                    updates.push({
                        id: node.id,
                        font: { size: newSize },
                        _currentSize: newSize
                    });
                }
            }
            
            if (updates.length > 0) {
                nodes.update(updates);
            }
        }

        // Run continuous polling for fisheye 
        // This captures canvas panning effortlessly
        setInterval(updateFisheye, 30);
