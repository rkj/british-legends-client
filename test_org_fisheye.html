    <div id="mynetwork"></div>
    <script type="text/javascript">
        var nodes = new vis.DataSet([{"id": "nfrst1", "label": "nfrst1\nDense forest.", "title": "You are wandering around in some dense forest.", "font": {"size": 14}}, {"id": "bunker", "label": "bunker\nCoal bunker.", "title": "You are in a coal bunker, just off the cellar. The only way out is to the east, where there is the cellar doorway. The atmosphere is thick with coal dust. To the south is a very small tunnel which you couldn't possibly enter even if you tried. The coal dust is particularly thick and dusty in the region near the door.", "font": {"size": 14}}, {"id": "rattun", "label": "rattun\nRat tunnel.", "title": "", "font": {"size": 14}}, {"id": "splair", "label": "splair\nSpider's lair.", "title": "", "font": {"size": 14}}, {"id": "nfrst2", "label": "nfrst2\nDense forest.", "title": "You are wandering around in some dense forest to the west of the foothills of some tall mountains.", "font": {"size": 14}}, {"id": "nfrst3", "label": "nfrst3\nDense forest.", "title": "You are wandering around in some dense forest. To the west is the entrance to a misty graveyard.", "font": {"size": 14}}, {"id": "nfrst4", "label": "nfrst4\nDense forest.", "title": "You are wandering around in some dense forest, to the east of a perilous cliff.", "font": {"size": 14}}, {"id": "sfrst1", "label": "sfrst1\nDense forest.", "title": "You are wandering around in some dense forest, to the southwest of a pleasant pasture, to the east of a perilous cliff and to the south of a thundering waterfall. To the southeast is a glade in the forest.", "font": {"size": 14}}, {"id": "sfrst2", "label": "sfrst2\nDense forest.", "title": "You are wandering around in some dense forest, to the south of a pleasant pasture, and to the west of a fuming swamp. To the southwest the forest opens up onto a magical glade.", "font": {"size": 14}}, {"id": "glade", "label": "glade\nMagical glade.", "title": "You are in a magical glade, surrounded by forest. East and west it looks inpenetrable, but in the northerly directions the trees are less dense. In the southerly directions, the trees are of soft pine, and through them to the southwest can be glimpsed a sundial.", "font": {"size": 14}}, {"id": "wabe", "label": "wabe\nSundial in pine forest.", "title": "This is part of a large pine forest. To the northeast, the forest opens up onto a magical glade, but in other directions is more forest, some of it too dense to allow passage. Before you stands an old, stone sundial, overgrown with ivy.", "font": {"size": 14}}, {"id": "sett", "label": "sett\nEntrance to badger's sett.", "title": "You are in part of a large pine forest. Northwest, the forest opens up onto a magical glade, and in all other directions the forest continues, although in some the trees are too thick to permit passage. In front of you, in the ground, a hole leads downwards into a badger's sett.", "font": {"size": 14}}, {"id": "insett", "label": "insett\nInside badger's sett.", "title": "You are inside a small sett belonging to a badger. It looks as though the badger is hidden in a smaller hole above the entrance, but there is no conceivable way you can reach him. The room looks the ideal place to store objects, since the badger acts as guard. The only way out is up.", "font": {"size": 14}}, {"id": "pines1", "label": "pines1\nPine forest.", "title": "You are wandering about amongst some soft pine trees. To the north the forest clears to become a glade, but everywhere else are more trees. Through the foliage to the northwest can be glimpsed a sundial.", "font": {"size": 14}}, {"id": "pines2", "label": "pines2\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through.", "font": {"size": 14}}, {"id": "pines3", "label": "pines3\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through. Eastwards, through the trees, can be glimpsed something resembling a bandstand.", "font": {"size": 14}}, {"id": "sqrm", "label": "sqrm\nSquirrel part of forest.", "title": "This is the part of the forest used by squirrels, however they all scampered off when they heard you coming. All around you is forest, some passable, some not.", "font": {"size": 14}}, {"id": "sqroom", "label": "sqroom\nSquirrel part of forest.", "title": "This is the part of the forest used by squirrels, and when you enter they all come scampering up to you, very playfully. In all directions is forest. The squirrels (all of which are red, naturally) are very happy to see you.", "font": {"size": 14}}, {"id": "pines4", "label": "pines4\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through. To the northeast through the trees can be made out a wooden building something like a bandstand. To the southeast there looks to be some sort of religious shrine.", "font": {"size": 14}}, {"id": "pines5", "label": "pines5\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through.", "font": {"size": 14}}, {"id": "pines6", "label": "pines6\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through. Through the trees to the southeast you can see what appears to be a bandstand.", "font": {"size": 14}}, {"id": "pines7", "label": "pines7\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through.", "font": {"size": 14}}, {"id": "bstand", "label": "bstand\nBandstand.", "title": "You are stood in a bandstand in the midst of the pine forest. All around you are trees, denser in the easterly directions than in the westerly ones. The bandstand hasn't been used for some time, obviously with it being in the middle of a forest, and in places its paint is peeling, but it is nevertheless a surprisingly fine example.", "font": {"size": 14}}, {"id": "gaptrm", "label": "gaptrm\nGolden appletree in pine forest.", "title": "This part of the forest was obviously once an orchard in years gone by, since in among the firs can be seen appletrees, although they are sadly fruitless. However, one tree is taller than the rest, and coloured an enchanted golden.", "font": {"size": 14}}, {"id": "whroom", "label": "whroom\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through.", "font": {"size": 14}}, {"id": "bbath", "label": "bbath\nBird bath in pine forest.", "title": "You are stood in amongst the trees of a pine forest. All around, the forest continues, although in some directions the trees are too thick to allow passage. Stood before you is an ornate stone birdbath, but the water it contains is not drinkable.", "font": {"size": 14}}, {"id": "lionrm", "label": "lionrm\nPine forest.", "title": "You are wandering around amongst some soft pine trees. All about you are more, some densely packed and others allowing passage through.", "font": {"size": 14}}, {"id": "clffst", "label": "clffst\nDense forest.", "title": "You are wandering around in some dense forest, to the east of a perilous cliff.", "font": {"size": 14}}, {"id": "wfrst1", "label": "wfrst1\nDense forest.", "title": "You are wandering around in some dense forest. To the east can be seen the entrance to a misty graveyard.", "font": {"size": 14}}, {"id": "track1", "label": "track1\nBeaten track near cliff.", "title": "You are at the end of a rough track. There is a dangerous cliff to the west marked \"Lovers' leap\".", "font": {"size": 14}}, {"id": "track2", "label": "track2\nBeaten track.", "title": "You're on a rough east - west track with a dense forest to the north and pasture to the south.", "font": {"size": 14}}, {"id": "ostart", "label": "ostart\nRoad opposite cottage.", "title": "You are standing on a badly paved road with a cemetery to the north and the home of a grave-digger to the south. An inscription on the cemetery gates reads, \"RESTING PLACE OF LOST SOULS\".", "font": {"size": 14}}, {"id": "road2", "label": "road2\nNarrow road.", "title": "You are on a narrow east-west road with forest to the north and gorse scrub to the south.", "font": {"size": 14}}, {"id": "start", "label": "start\nNarrow road between lands.", "title": "You are stood on a narrow road between The Land and whence you came. To the north and south are the small foothills of a pair of majestic mountains, with a large wall running round. To the west the road continues, where in the distance you can see a thatched cottage opposite an ancient cemetery. The way out is to the east, where a shroud of mist covers the secret pass by which you entered The Land.", "font": {"size": 14}}, {"id": "wayout", "label": "wayout\nYou force yourself through the narrow, mist-covered gap...", "title": "", "font": {"size": 14}}, {"id": "wpstre", "label": "wpstre\nWest pasture.", "title": "You are in comparatively pleasant pasture. To the south is a river, to the north a track. Eastwards the pasture is seen to continue, while to the northeast is the flower garden of a strange cottage. To the south flows a river.", "font": {"size": 14}}, {"id": "clifff", "label": "clifff\nCliff.", "title": "You are standing on the edge of a cliff surrounded by forest to the north and a river to the south. A chill wind blows up the unclimbable and unscaled heights. At the base of the cliff you can just make out the shapes of jagged rocks.", "font": {"size": 14}}, {"id": "fallin", "label": "fallin\nFalling off cliff.", "title": "You are falling off a very high cliff onto a beach.", "font": {"size": 14}}, {"id": "slidin", "label": "slidin\nSliding down chute.", "title": "You are sliding down a slippery tunnel, twisting and turning tunnel at great speed.", "font": {"size": 14}}, {"id": "epstre", "label": "epstre\nEast pasture.", "title": "Around you is a delightful pasture. To the south is a fast flowing stream. Further north and east you can see a woodman's hut and to the north is gorse scrub. Northwestwards you can see a strange, forbidding cottage, which you can enter via its french windows.", "font": {"size": 14}}, {"id": "spstre", "label": "spstre\nSouth pasture.", "title": "All about you is a pleasant pasture. To the north is a fast-flowing stream, and to the south is forest. Westwards is a thundering waterfall.", "font": {"size": 14}}, {"id": "garden", "label": "garden\nFlower garden.", "title": "You are in a well-kept garden. There is an unexpectedly sweet smell here and you notice lots of flowers. To the east across a path there is more garden.", "font": {"size": 14}}, {"id": "path", "label": "path\nPath.", "title": "You are standing on a path which leads off a road to the north, to a cottage south of you. To the west and east are separate gardens.", "font": {"size": 14}}, {"id": "patch", "label": "patch\nVegetable garden.", "title": "You are standing in the middle of what was obviously a vegetable garden. However it has not been tended for years and most of the vegetables have run wild.", "font": {"size": 14}}, {"id": "gorse", "label": "gorse\nGorse.", "title": "You are in a tangled mass of prickly gorse.", "font": {"size": 14}}, {"id": "wfall", "label": "wfall\nWaterfall.", "title": "Before you is an awe-inspiring sight; a waterfall plummets over a cliff and explodes in a dazzling crescendo of rainbow colour on the menacing rocks below.", "font": {"size": 14}}, {"id": "river1", "label": "river1\nRiver.", "title": "You are on the bank of a fast flowing river with pasture to the north and forest to the south.", "font": {"size": 14}}, {"id": "river2", "label": "river2\nRiver.", "title": "You are on the bank of a fast flowing river with pasture to the north and forest to the south.", "font": {"size": 14}}, {"id": "rapids", "label": "rapids\nRapids.", "title": "You are on the bank of some dangerous rapids. Beyond them to the east the river goes underground; to the west it continues out of sight, and you can hear a thundering as of falling water from that direction. To the south can be seen (and smelled!) a fuming swamp, and southeast is a small pond.", "font": {"size": 14}}, {"id": "mfrst", "label": "mfrst\nForest near mountains.", "title": "You are in dense forest at the base of some snow-capped mountains, wreathed in clouds. The foothills are so beautiful that you yearn to be able to climb them and lie eternally in dew drenched grass, with an air of inner peace and total tranquility. You realise, however, that this is silly!", "font": {"size": 14}}, {"id": "cave", "label": "cave\nCave.", "title": "This is a cave, wherein once dwelled a hermit in times long passed. Above is a huge mountain towering amongst the clouds, and outside can be seen a pasture, small cottage and a cemetery in the distance. At the east end of the cave is a small opening in the wall.", "font": {"size": 14}}, {"id": "pond1", "label": "pond1\nPond in swamp.", "title": "This is a small, shallow freshwater pond, fed by a small brook joining it to the river. It is too shallow to swim, and there are no edible fish living in it. Northwest are rapids, but everywhere else is swamp.", "font": {"size": 14}}, {"id": "nhill1", "label": "nhill1\nFoothills.", "title": "You are in the foothills, such as they are, to a tall mountain. To the south is an east-west road, and to the north more small hillocks. Westwards lies a forest, but passage east is impossible because of a huge stone wall which blocks the way, built to keep the denizens of The Land away from the surrounding area...", "font": {"size": 14}}, {"id": "nhill2", "label": "nhill2\nFoothills.", "title": "You are in some higher foothills of the mountains, but the way north and east is blocked by a huge wall. More foothills are downwards to the south, and to the west is forest. In the distance can be seen a small, thatched cottage, and some wide, open, pastures.", "font": {"size": 14}}, {"id": "shill1", "label": "shill1\nFoothills.", "title": "These are some foothills to the tall mountains which tower above you to the east. Travel in that direction is impossible because of a tall stone wall, built by the locals when they learned of the creatures dwelling within The Land... To the north runs an east-west road, and to the west is forest. The hills rise slowly to the south.", "font": {"size": 14}}, {"id": "shill2", "label": "shill2\nFoothills.", "title": "This is a small hillock atop a cave. To the north the hill slopes downwards, but to the east and south curves a stone wall which is impossible to scale. Below can be seen a stream cascading over another cliff further west, and beyond that is the sea.", "font": {"size": 14}}, {"id": "lounge", "label": "lounge\nLounge.", "title": "This is the lounge. Around you are some pieces of elegant troll-hide furniture, although all the portable ones have long been stolen so there's no point in getting any... Ahead of you to the south is the dining area, and to the west is the hall. An archway to the east leads to the study.", "font": {"size": 14}}, {"id": "dining", "label": "dining\nDining area.", "title": "You are standing in the dining area of a long narrow room. To the north is the lounge, to the west is a serving hatch which, you surmise, leads to the kitchen (although it's too small to climb through). To the south are some french windows which open out over a pasture.", "font": {"size": 14}}, {"id": "kitche", "label": "kitche\nKitchen.", "title": "Around you is all the usual paraphernalia that can found in a kitchen, although it is firmly fixed down so you can't take any of it away. The pantry is to the northwest, and a doorway to the hall is to the north. East is a small serving hatch through which you can see, if not move to, the dining room.", "font": {"size": 14}}, {"id": "hall", "label": "hall\nHall.", "title": "You are standing in an oddly shaped hall. To the south is a doorway, the east is an archway, and some dark forbidding stairs lead upwards to the southeast. Immediately to the west is a fitted wardrobe, and some eerie, granite steps to the southwest lead downwards to the cellar.", "font": {"size": 14}}, {"id": "study", "label": "study\nStudy.", "title": "This is the old study used by the gravedigger who once owned this cottage, where he read up his craft. It is decorated in sombre colours, and the windows are small and dirty. On the south wall is a large bookcase reaching up to the ceiling, made of an enchanted oak.", "font": {"size": 14}}, {"id": "ssteps", "label": "ssteps\nSecret steps.", "title": "These are some secret steps leading downwards through a false wall to the underworld. At the bottom, to the south, is darkness; at the top, to the north, stands a large bookcase, acting as a doorway between here and a study.", "font": {"size": 14}}, {"id": "zroom", "label": "zroom\nZombie room.", "title": "This is a small room at the bottom of a short flight of steps leading up to the north. The walls are damp, and covered in fungal stains. To the south is a narrow passage leading downwards.", "font": {"size": 14}}, {"id": "downps", "label": "downps\nNarrow passage.", "title": "This is a small passage leading downwards to the south. To the north is a small room, and at the other end a door inscribed with strange runes.", "font": {"size": 14}}, {"id": "sorcrm", "label": "sorcrm\nSorcerer's room.", "title": "You look around you in disbelief at the exotic room which you have discovered. It seems to be a room used by some sorcerer, wherein he bound his spells and worked his magic. The room is lit by an illusory red light, and many of the strange objects you see defy description. To the north is a door inscribed with strange runic symbols, but there is no other exit.", "font": {"size": 14}}, {"id": "stairs", "label": "stairs\nHalfway up the stairs.", "title": "You are sitting on a step halfway up the stairs, a ghostly voice recites a poem by A. A. Milne to itself. Further up you can make out a landing, downwards you can see a hallway.", "font": {"size": 14}}, {"id": "landin", "label": "landin\nUpstairs landing.", "title": "You are standing on the upstairs landing. There are doorways in most directions, the stairs lead downwards and to the northwest.", "font": {"size": 14}}, {"id": "bathrm", "label": "bathrm\nBathroom.", "title": "The bathroom contains a toilet and a handbasin, and on the wall is a shelf with \"MEDICINES\" written on it. The bath was removed long ago, but the toilet and handbasin still look usable. The only exit is to the east.", "font": {"size": 14}}, {"id": "cupd1", "label": "cupd1\nAiring cupboard.", "title": "This is a small cupboard, most of which is filled with a hot water tank. The rest of the cupboard is filled with shelving.", "font": {"size": 14}}, {"id": "bdrm01", "label": "bdrm01\nLarge bedroom.", "title": "You are standing in a large bedroom. To the south is a window out of which, you can see a pleasant field with a stream flowing swiftly at the bottom of it. There is a doorway to the north.", "font": {"size": 14}}, {"id": "bdrm02", "label": "bdrm02\nMain bedroom.", "title": "This is the main bedroom. There is a window to the north from which you can see the road that runs past the front of the cottage. The way out is south, onto the landing.", "font": {"size": 14}}, {"id": "bdrm03", "label": "bdrm03\nSmall bedroom.", "title": "The room appears to have been used as a nursery at some time as the walls are covered with pictures of elves and gnomes all smiling happily. There is a fitted cupboard to the southwest and the way out is to the northwest.", "font": {"size": 14}}, {"id": "cupd2", "label": "cupd2\nFitted cupboard.", "title": "The cupboard appears to be bereft of any shelving, there are scratches on the wall but there is nothing here which can explain them.", "font": {"size": 14}}, {"id": "wrdbe", "label": "wrdbe\nFitted wardrobe.", "title": "You are inside the fitted wardrobe. The only apparent exit is to the east, into a hallway.", "font": {"size": 14}}, {"id": "pantry", "label": "pantry\nPantry.", "title": "You are standing in the pantry. Around you are some marble slabs and shelves which are badly damaged and not worth anything, but which have obviously once held mouthwatering delicacies of rare and ancient types.", "font": {"size": 14}}, {"id": "hut", "label": "hut\nWoodsman's hut.", "title": "The hut is obviously the home of a woodsman. There are various pieces of rude wooden furniture scattered about. On the walls are stuffed fish and birds, they appear old and are fixed firmly to the wall as if the owner has treasured them for a long time.", "font": {"size": 14}}, {"id": "maze1", "label": "maze1\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze2", "label": "maze2\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze3", "label": "maze3\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze4", "label": "maze4\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze5", "label": "maze5\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze6", "label": "maze6\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze7", "label": "maze7\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze8", "label": "maze8\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze9", "label": "maze9\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze10", "label": "maze10\nYou are lost in a misty graveyard.", "title": "", "font": {"size": 14}}, {"id": "maze25", "label": "maze25\nYou are standing in front of a large tombstone.", "title": "", "font": {"size": 14}}, {"id": "uswamp", "label": "uswamp\nBottom of swamp.", "title": "Isn't it short of air here, beneath all that swamp?", "font": {"size": 14}}, {"id": "swamp1", "label": "swamp1\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp2", "label": "swamp2\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp3", "label": "swamp3\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp4", "label": "swamp4\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp5", "label": "swamp5\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp6", "label": "swamp6\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp8", "label": "swamp8\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp9", "label": "swamp9\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swampa", "label": "swampa\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swampb", "label": "swampb\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swampc", "label": "swampc\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swampd", "label": "swampd\nYou are waylaid in a treacherous swamp.", "title": "", "font": {"size": 14}}, {"id": "swamp7", "label": "swamp7\nYou are in a drier part of the swamp.", "title": "", "font": {"size": 14}}, {"id": "ydead3", "label": "ydead3\nThe volatile marsh gases ignite from your light and in an instant you", "title": "are a charred corpse which is sucked unmercifully into the deep.", "font": {"size": 14}}, {"id": "beach", "label": "beach\nRocky Beach.", "title": "You are standing on a rocky beach. Above you is a mighty cliff which extends out to the sea on either side of you, thus forming an enclosed cove. Behind you is a forbidding tunnel, and to the south a mighty waterfall smashes into the rocks in another part of the beach. Out to the west, in the sea, can be seen a wrecked galleon, trapped on some vicious rocks.", "font": {"size": 14}}, {"id": "beach2", "label": "beach2\nBottom of waterfall.", "title": "You are stood on a sandy part of a beach, at the bottom of a thundering waterfall which smashes into the rocks from the cliff above. To the north is a rockier part of the beach, but otherwise the area is cut off by the sea apart from some slippery rocks to the south. To the west, in the sea, can be seen the wreckage of a galleon, torn against some vicious rocks.", "font": {"size": 14}}, {"id": "bch1", "label": "bch1\n", "title": "", "font": {"size": 14}}, {"id": "bch2", "label": "bch2\n", "title": "", "font": {"size": 14}}, {"id": "srock1", "label": "srock1\nSlippery rocks.", "title": "You are delicately attempting to cross some slippery rocks. To the west can be seen a wrecked galleon over the sea, to the north a beach, and in all other directions more rocks.", "font": {"size": 14}}, {"id": "srock2", "label": "srock2\nSlippery rocks.", "title": "You are delicately attempting to cross some slippery rocks. To the west can be seen a wrecked galleon, and in all directions are more rocks.", "font": {"size": 14}}, {"id": "srock3", "label": "srock3\nSlippery rocks.", "title": "You are delicately attempting to cross some slippery rocks. To the west can be seen a galleon wrecked on some vicious rocks out at sea, but all around you are slippery rocks.", "font": {"size": 14}}, {"id": "inlet", "label": "inlet\nConcealed inlet.", "title": "This is a small inlet from the sea, concealed from view by some slippery rocks to the northwest. Out at sea to the west can be seen the wreckage of a galleon, and above you towers a mighty cliff. There is a bird's nest above, the route to which looks climbable.", "font": {"size": 14}}, {"id": "nest", "label": "nest\nEagle's nest.", "title": "This is the nest of an eagle, stuck firmly to the cliff overlooking the sea. Out at sea can be seen a ship on some vicious rocks, and there is a strong current whirling around except to the north from west of the inlet. The cliff above here is unclimbable.", "font": {"size": 14}}, {"id": "sea1", "label": "sea1\nSea.", "title": "You are out at sea. To the east is a beach, further out to the west a galleon wrecked on some vicious rocks.", "font": {"size": 14}}, {"id": "sea2", "label": "sea2\nSea.", "title": "You are out at sea, midway between a beach to the east, some slippery rocks to the southeast, and a wrecked galleon to the west.", "font": {"size": 14}}, {"id": "sea3", "label": "sea3\nSea.", "title": "You are out at sea. To the east and west are rough waters, but northern and southern directions look safe enough to take.", "font": {"size": 14}}, {"id": "sea4", "label": "sea4\nSea.", "title": "You are out at sea, midway between a beach to the east, some slippery rocks to the southeast, and a wrecked galleon to the west.", "font": {"size": 14}}, {"id": "sea5", "label": "sea5\nSea.", "title": "You are out at sea, to the west of an inlet and to the southwest of some slippery rocks. The waters all around you are rough, but northwards and westwards is calm enough to sail.", "font": {"size": 14}}, {"id": "sea6", "label": "sea6\nSea.", "title": "You are out at sea near some vicious rocks to the west, upon which is wrecked a galleon. In the distance to the east can be seen a mighty cliff and a waterfall, and to the south of that some slippery rocks.", "font": {"size": 14}}, {"id": "sea7", "label": "sea7\nSea.", "title": "You are out to sea, to the southwest of some vicious rocks upon which is wrecked a galleon.", "font": {"size": 14}}, {"id": "sea8", "label": "sea8\nSea.", "title": "You are out on the high seas. Far to the north can be seen an island, and far to the east a wrecked ship.", "font": {"size": 14}}, {"id": "sea9", "label": "sea9\nSea.", "title": "You are on the high seas, far to the south of an island. the mast of a wrecked ship can be seen on the south-eastern horizon.", "font": {"size": 14}}, {"id": "sea10", "label": "sea10\nSmall bay.", "title": "You are in a small bay, skirted by strong currents. To the north is a steep slope, which the swirling flows about you make the only safe place to land. The island is a huge rock, topped by a flat plateau upon which is a huge circle of weatherbeaten stones.", "font": {"size": 14}}, {"id": "sea11", "label": "sea11\nSea.", "title": "You are out at sea, next to the coastline. To the west, the sea looks still sailable, but northwards it gets rough. Eastwards is a jetty, which juts out into the waves from a beach beyond. To the south, the relative tranquility of these coastal waters continues.", "font": {"size": 14}}, {"id": "sea12", "label": "sea12\nSea.", "title": "You are at sea, close to the coastline to the east. Northwards and northwestwards, the sea looks safe enough to navigate, and to the southwest there is a channel around a headland protruding from the coast. Elsewhere, however, it is rough and sailing there would probably deposit you in Davy Jones's locker...", "font": {"size": 14}}, {"id": "sea13", "label": "sea13\nSea.", "title": "You are out to sea, away from the coastline. All around, except in the southerly and easterly directions, the water is very rough, and it would take a much larger craft than yours to travel there safely. Far beyond a headland to the south you can see a ship wrecked on some vicious rocks, but there is nothing but tempestuous sea beyond the cliff to the north.", "font": {"size": 14}}, {"id": "sea14", "label": "sea14\nSea.", "title": "You are in a narrow channel of calm water, sailing around a headland with rough seas swirling about it, its granite rocks unfortunately precluding any attempt at landing. Northwards is a small bay with a jetty to its east; southwards is a larger expanse of navigable water.", "font": {"size": 14}}, {"id": "sea15", "label": "sea15\nSea.", "title": "You are out at sea, to the south of some vicious rocks upon which lies a wrecked galleon. Some way to the east can be seen an inlet at the foot of a tall cliff, and south, through strong currents on either side, is a small island upon which has been built a large archway.", "font": {"size": 14}}, {"id": "sea16", "label": "sea16\nSea.", "title": "You are sailing north of a small island in the middle of rough seas. The only calm waters lie further north, where in the distance can be seen a galleon, wrecked on some vicious rocks.", "font": {"size": 14}}, {"id": "woe1", "label": "woe1\nNorth part of Isle of Woe.", "title": "You are standing on a small island, way out to sea. The waters are relatively calm, but too far in any direction save north and they become dangerous. A large, ancient archway straddles the island, its faces well eroded over many thousands of years. To reach the southern part of the island you would have to pass through it.", "font": {"size": 14}}, {"id": "woe2", "label": "woe2\nSouth part of Isle of Woe.", "title": "You find youself stood in the southern half of a small, windswept island, separated from the northern half by a large archway which stands from shore to shore. The seas around here sweep swiftly northwards, too, but are not dangerous close to the island.", "font": {"size": 14}}, {"id": "fslop1", "label": "fslop1\nForest on steep slope.", "title": "You are in dense forest, sloping from the south downwards to the north.", "font": {"size": 14}}, {"id": "fslop2", "label": "fslop2\nForest on steep slope.", "title": "You are in dense forest, sloping from the south downwards to the north. To the southeast are the foothills of an enormous mountain.", "font": {"size": 14}}, {"id": "fslop3", "label": "fslop3\nForest on steep slope.", "title": "You are in dense forest, sloping from the south downwards to the north. To the west can be heard the roar of the sea, as it crashes into the cliffs beyond the trees.", "font": {"size": 14}}, {"id": "sdale", "label": "sdale\nSouth dale.", "title": "This is a peaceful dale, nestled at the base of a huge afforested escarpment which slopes steeply away to the south. Northwards is another forest, and eastwards the overgrown grounds of a mausoleum, dwarfed by an enormous mountain which stands high above. The dale curves away to the northwest, and westwards is a dangerous cliff.", "font": {"size": 14}}, {"id": "ogrnds", "label": "ogrnds\nOvergrown grounds of mausoleum.", "title": "This once well-tended garden has now, sadly, fallen into a state of neglect. Stood within, its doorway to the southeast, is a cold, bemossed mausoleum. The scene is dominated by a huge cliff to the east, at the base of an awe-inspiring mountain which climbs away into the clouds, its foothills sweeping down into a steep escarpment covered in forest to the south. North is more forest, and west a dale. To the northeast there looks to be a railway cutting.", "font": {"size": 14}}, {"id": "mosolm", "label": "mosolm\nMausoleum.", "title": "You are stood inside a piece of history, a mausoleum which is far more ancient than its weatherbeaten exterior would indicate. Within the circular walls are the tombs of many, their names and heraldic designs carved into the stones in a language which was dead before Atlantis sank. The easiest exit from this eerie window on the past is to the northwest. On the floor, however, is carved an inscription in an archaic predecessor of your own language, which is readable. The floor and ceiling do not have entrances, but the tombs seem to.", "font": {"size": 14}}, {"id": "ntomb", "label": "ntomb\nNorth tomb.", "title": "This is the north tomb of the mausoleum, but the bones of the dead have long since been reduced to dust by Time. The walls are close together, and there is no evidence of there having been a coffin within. The exit is to the south.", "font": {"size": 14}}, {"id": "wtomb", "label": "wtomb\nWest tomb.", "title": "This side-room is the west tomb of the mausoleum. An enormous sarcophagus is lain against the back wall, and the way out is to the east, leading back into the mausoleum entrance hall.", "font": {"size": 14}}, {"id": "stomb", "label": "stomb\nSouth tomb.", "title": "This small chamber is the southern tomb of the mausoleum, which has not been used for burial purposes. The exit is to the north, and the walls are curiously uninteresting.", "font": {"size": 14}}, {"id": "swtomb", "label": "swtomb\nSouthwest tomb.", "title": "This tomb is to the southwest of the mausoleum, and is quite richly decorated. The walls are stained a regal purple, and the floor is a mosaic of intricate design. The whole room has an eastern aura, and bears many gilt symbols in a language you cannot recognise inlaid upon the door.", "font": {"size": 14}}, {"id": "etomb", "label": "etomb\nEast tomb.", "title": "This room consists the eastern tomb of the mausoleum, and is the oldest part of the structure. Strange cobwebs adorn the far wall, and the light casts dancing shadows on the roof which seem to come to life in this relic of prehistory. The only exit is to the west.", "font": {"size": 14}}, {"id": "setomb", "label": "setomb\nSoutheast tomb.", "title": "This is the southeastern tomb of the mausoleum, and has not been used for burial purposes. The unplastered walls and uneven floor give a sense of starkness which makes the uneasy mind wary, lest some uncanny spirit has made the deathly room its abode.", "font": {"size": 14}}, {"id": "dcliff", "label": "dcliff\nDangerous cliff.", "title": "You are stood by the edge of a dangerous, partly-forested cliff, which slopes downwards to the north. To the east and south, the forest becomes thicker, and to the northeast the slope levels out onto a dale. The crumbling eroded western edge of the cliff looks so liable to collapse that no-one in their right mind would risk certain death by leaping off.", "font": {"size": 14}}, {"id": "scrubs", "label": "scrubs\nScrub slope.", "title": "This is a gentle slope down westwards to a beach, covered in scrubs and small bushes. To the south, the slope becomes much steeper, and rises into a huge escarpment high above. Eastwards is a dale, and northwards runs an east-west section of railway line.", "font": {"size": 14}}, {"id": "wdale", "label": "wdale\nWest dale.", "title": "This is a pleasant dale, hugging the slopes of a huge forest-covered escarpment which rises to the south. East is more forest, but the dale curves southeastwards behind it. West is a slope of scrubland, which rolls down to the sea beyond. North is a railway line, which runs from east to west, standard gauge.", "font": {"size": 14}}, {"id": "forist", "label": "forist\nDense forest.", "title": "You are stood in a dense forest, with a railway line to the north and a pleasant dale to the south and west.", "font": {"size": 14}}, {"id": "cuttin", "label": "cuttin\nRailway cutting.", "title": "You are stood on a shallow mound, which has been cut through by a now rusting railway line, in an east-west direction to the north. To the south is a mausoleum in overgrown grounds, the remnants of a surrounding fence no longer preventing entry. East and west are forests, and southwest is a dale at the bottom of a long, steep slope.", "font": {"size": 14}}, {"id": "efrst1", "label": "efrst1\nForest at base of cliff.", "title": "The forest in which you stand is nestled at the base of a frighteningly tall mountain which rises off in an unclimbable cliff to the east. From inside it, to the north, appears to run a railway line, which cuts through a shallow mound to the west. South stands a cold, grey mausoleum in overgrown grounds, protected ineffectually by the remains of a fence which long since rotted away to virtually nothing.", "font": {"size": 14}}, {"id": "emine", "label": "emine\nEntrance to mine.", "title": "This is the entrance to an underground tin mine, beneath a huge cliff. Outside is to the west, and down to the east runs a main passage into the mine proper. Both directions is a railway track, overgrown enough to show it hasn't been used for many a year.", "font": {"size": 14}}, {"id": "main1", "label": "main1\nMain passage.", "title": "This is the main passage in the tin mine, running east-west. Light comes from the west end, whereas the east delves deeper underground. The length of the passage there runs a rusted railway track.", "font": {"size": 14}}, {"id": "main2", "label": "main2\nMain passage.", "title": "This is the junction on the main passage in the mine. To the west, whence comes light, the passage rises. Also in this direction runs a railway track, although it stops where you are now standing. To the north is a major shaft, and upwards to the east are some roughly hewn but well-worn steps. The passage continues to the southeast. The floor of this room seems to be slightly wet.", "font": {"size": 14}}, {"id": "platfm", "label": "platfm\nPlatform.", "title": "This is a sort of landing at the top of some steps which lead down to the west. To the east is a major shaft, which runs upwards, and to the north is a makeshift shed. The platform looks well used.", "font": {"size": 14}}, {"id": "shed", "label": "shed\nShed.", "title": "This is a decrepit but nevertheless rather sturdy shed, used by the tin-miners in the old days to store their equipment. The way out is to the south, onto a platform at the top of a staircase.", "font": {"size": 14}}, {"id": "valvrm", "label": "valvrm\nValve on staircase.", "title": "You are halfway up (or down!) a staircase carved into the rock, although it is well used. Fixed solidly into the wall is a rusted wheel valve-release, of the sort used in large plumbing work. In contrast to the stairs, it looks hardly used at all...", "font": {"size": 14}}, {"id": "shaft1", "label": "shaft1\nVertical shaft.", "title": "This is a vertical shaft, quite long, but easy to traverse because of the iron rungs hammered into its sides. Such shafts were used long ago by the tin-miners to reach the faces. At the top end, to the south, is a main passage. Similarily, there is a minor passage at the bottom, to the east.", "font": {"size": 14}}, {"id": "shaft2", "label": "shaft2\nVertical shaft.", "title": "This is a vertical shaft, which you find yourself able to climb because of the heavy iron rungs forced deep into the rock. At the bottom end, to the west, is a main passage; at the top, however, there is only a minor passage, to the north.", "font": {"size": 14}}, {"id": "main3", "label": "main3\nMain passage.", "title": "This is a three-way junction in the main passage. Exits are upwards to the northwest, downwards to the southwest, or to the east.", "font": {"size": 14}}, {"id": "main4", "label": "main4\nMain passage.", "title": "You are walking down a main passage in the tin mine. To the east is a vertical shaft, whereas the passage turns downwards to the south and upwards to the west.", "font": {"size": 14}}, {"id": "shaft3", "label": "shaft3\nVertical shaft.", "title": "This is a vertical shaft leading deep underground. At the top end, to the west, is a main passageway; at the bottom end, to the south, there is a minor one. The shaft is climbable because of heavy iron rungs biting into the sides, although the walls are a bit damp.", "font": {"size": 14}}, {"id": "main5", "label": "main5\nMain passage.", "title": "This is a main passage in the tin mine, running up to the northeast and curving down to the south. There is a fair amount of rubble around, as though there has been a cave-in nearby at some time in the past.", "font": {"size": 14}}, {"id": "main7", "label": "main7\nMain passage.", "title": "This is a north-south main passage, which although clear at the north end, runs into a pile of rubble to the south. It is plain that the pit-props have given way some time, and the way through is almost impossible. You might be able to travel south, however, if you were to drop everything you're carrying...", "font": {"size": 14}}, {"id": "dpass1", "label": "dpass1\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try n or ne.", "font": {"size": 14}}, {"id": "dpass2", "label": "dpass2\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try sw, s, se or ne.", "font": {"size": 14}}, {"id": "dpass3", "label": "dpass3\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try n, sw or se.", "font": {"size": 14}}, {"id": "dpass4", "label": "dpass4\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try nw, w or sw.", "font": {"size": 14}}, {"id": "dpass5", "label": "dpass5\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try n or se.", "font": {"size": 14}}, {"id": "dpass6", "label": "dpass6\nDangerous passage.", "title": "This is a dangerous passage, the description of which mortals can't normally read! Try nw or ne.", "font": {"size": 14}}, {"id": "sectn", "label": "sectn\nSection of main passage.", "title": "This is a remaining section of the main passage, but I couldn't care less because mortals still can't read it! Try e or nw.", "font": {"size": 14}}, {"id": "main6", "label": "main6\nMain passage.", "title": "You find yourself in a main tunnel, which although clear at the north end, runs into a pile of rubble to the south. You could probably negotiate the cave-in if you were to drop everthing, but you won't be able to see if you do...", "font": {"size": 14}}, {"id": "minor1", "label": "minor1\nMinor passage.", "title": "This is a minor passage, at the base of a shaft to the west. It continues to the east, towards the tin face. There is a narrow crack to the southwest, but you'd have to drop everything to be able to pass through.", "font": {"size": 14}}, {"id": "minor2", "label": "minor2\nMinor passage.", "title": "You are walking along a narrow passage, which splits three ways. To the west, it continues upwards; to the south, it bends away downwards; to the east, it meets the face, from where tin used to be mined using picks.", "font": {"size": 14}}, {"id": "face1", "label": "face1\nFace.", "title": "This is one of the faces upon which work was proceeding when the mine closed down. The only way out is to the west, to the previous face, now a minor passage.", "font": {"size": 14}}, {"id": "minor3", "label": "minor3\nMinor passage.", "title": "This minor passage runs upwards to the north, and downwards into a shaft to the south. It doesn't look like is has been used very often.", "font": {"size": 14}}, {"id": "shaft4", "label": "shaft4\nVertical shaft.", "title": "This vertical shaft is exceedingly long, but ascent and descent is facilitated by heavy iron rungs set into the walls. At the top end, to the north, is a minor passage. At the bottom, to the south, is a tight passage, which looks hardly used.", "font": {"size": 14}}, {"id": "tightp", "label": "tightp\nTight passage.", "title": "This is a very small and tight passage, and it is something of an effort to enter although no-one need drop anything to do so. To the south is a hardly-worked tin face; indeed, it looks like work was in progress to widen the tunnel when the mine closed. To the east is a crack, leading into the rock.", "font": {"size": 14}}, {"id": "face4", "label": "face4\nFace.", "title": "This is one of the tin faces, where in years gone by the tin miners would cut away to reach the ore. The only way out is to the north onto a tight passage.", "font": {"size": 14}}, {"id": "doomrm", "label": "doomrm\nDoom room.", "title": "As soon as you enter, a section of floor gives way and you find yourself falling into a pit. The finely-balanced rock slides back above your head, and you find yourself stuck.", "font": {"size": 14}}, {"id": "crrm", "label": "crrm\nCrack room.", "title": "Hello wizard, guess what mortals can't see without help? Try ne or w.", "font": {"size": 14}}, {"id": "edwrlm", "label": "edwrlm\nEntrance to dwarf realm.", "title": "You find yourself crouched in a low passage, obviously the work of dwarfs, with a crack in the rock to the west and an ornamented archway to the southeast. You realise that this must be the entrance to the fabulous dwarf realm, about which there are many terrible legends.", "font": {"size": 14}}, {"id": "minor5", "label": "minor5\nMinor passage.", "title": "Where you are now is a minor passage at the top of a vertical shaft to the south. Eastwards, the passage continues, and to the north is a side passage, which seems to have been started in error, and abandoned.", "font": {"size": 14}}, {"id": "minor6", "label": "minor6\nMinor passage.", "title": "This is a minor passage, leading from the west to a tin face to the east. South, there is a smooth-walled, vertical ventilator duct, or so it appears. It looks particularily dangerous, however, and smells of charcoal.", "font": {"size": 14}}, {"id": "face2", "label": "face2\nFace.", "title": "This is a tin face, moderately used. The exit is to the west into a minor passage.", "font": {"size": 14}}, {"id": "sidpsg", "label": "sidpsg\nSide passage.", "title": "This is the beginnings of a minor passage, but upon which work ceased early because of the hardness of the rock. The passage proper is to the south.", "font": {"size": 14}}, {"id": "minor7", "label": "minor7\nMinor passage.", "title": "This is another minor passage in the tin mine. It starts at the base of a shaft to the north, and continues to the south.", "font": {"size": 14}}, {"id": "minor8", "label": "minor8\nMinor passage.", "title": "This minor passage continues to the north, but bends onto a face to the east. There is one of the common roof collapses to the south, which you could probably traverse if you weren't carrying anything.", "font": {"size": 14}}, {"id": "face3", "label": "face3\nFace.", "title": "This is a frequently-used tin face, by the look of things, since it seems to have a high grade of tin, although most of it has now been mined, of course... The way out is to the west, onto a minor passage.", "font": {"size": 14}}, {"id": "peril1", "label": "peril1\nPerilous passage.", "title": "Hi wizards! Try n or sw.", "font": {"size": 14}}, {"id": "peril2", "label": "peril2\nPerilous passage.", "title": "Hi wizards! Try e or ne.", "font": {"size": 14}}, {"id": "peril3", "label": "peril3\nPerilous passage.", "title": "Hi wizards! Try nw or sw.", "font": {"size": 14}}, {"id": "peril4", "label": "peril4\nPerilous passage.", "title": "Hi wizards! Try nw or s.", "font": {"size": 14}}, {"id": "peril5", "label": "peril5\nPerilous passage.", "title": "Hi wizards! Try n or s.", "font": {"size": 14}}, {"id": "ledge1", "label": "ledge1\nLedge.", "title": "You are stood on a ledge overlooking a fantastic sight. By light coming from what seems to be a hole high above you, you witness an incredible view of the fabled dwarf realm of legend. There is no way to get down from here, although far to the southwest there seems to be such an entrance. The ledge continues to the east.", "font": {"size": 14}}, {"id": "ledge2", "label": "ledge2\nLedge.", "title": "You are stood on the ledge, high above the dwarf realm. Although the view is awe-inspiring, you are careful to keep your footing lest you fall the many hundreds of feet and kill yourself below. The ledge continues to the east and west.", "font": {"size": 14}}, {"id": "boledg", "label": "boledg\n", "title": "", "font": {"size": 14}}, {"id": "ledge3", "label": "ledge3\nLedge.", "title": "This is the easternmost end of the ledge, which is a bit wider than the rest of it. Below you you can see a pasture, and some forests, but the scene is stolen by a dazzling dwarfen citadel in the centre of the cave below, which catches the mysterious light from above and spreads it out in a glorious cascade of sparkling colours.", "font": {"size": 14}}, {"id": "bldg", "label": "bldg\nBottom of ledge.", "title": "You are stood at the bottom of the northern wall of this strange subterrainean domain. High above you can be seen a narrow ledge, but there are no means by which you can climb there from here. To the south is a pasture, now lying fallow.", "font": {"size": 14}}, {"id": "dwpst1", "label": "dwpst1\nDwarfen pasture.", "title": "You are strolling across a pasture, used by the dwarfs for their crops, although now it is overgrown because it is the fallow year. To the north is the bottom of the northern wall, high up which is a ledge. East is a forest, and south the entrance to the dominating citadel.", "font": {"size": 14}}, {"id": "befcit", "label": "befcit\nBefore citadel.", "title": "You are stood before a huge marble-covered citadel, the entrance to which is to the east. It is inset with coloured stones and catches the sun from high above to create a glorious rainbow effect. North and south are pastures, and to the west are steps up to a shelf in the rock, and an archway.", "font": {"size": 14}}, {"id": "dwpst2", "label": "dwpst2\nDwarfen pasture.", "title": "This is a pasture to the south of the entrance to the citadel, the as yet unripe wheat swaying to and fro' to unseen winds. To the south and east are forests of oak.", "font": {"size": 14}}, {"id": "panora", "label": "panora\nPanoramic view.", "title": "You are stood on a shelf in the rock, with a grand archway through into a passage to the northwest. This, however, is nothing compared to the spectacular sight to the east. You see that this is a cavern, light coming in by what seems to be a hole in the roof high above. Steps lead down to the base of a huge citadel, surrounded by a wall with forests beyond. To the northeast and southeast are two pastures, and from somewhere can be heard a running spring. The light reflecting from the citadel's marbled walls is so breathtaking you feel quite in awe.", "font": {"size": 14}}, {"id": "ufrst1", "label": "ufrst1\nUnderground forest.", "title": "You are stood in a pleasant oak forest, with a pasture to the west. The forest continues to the southeast, but to the north is the cavern wall and to the south the wall of the citadel.", "font": {"size": 14}}, {"id": "ufrst2", "label": "ufrst2\nUnderground forest.", "title": "You are walking through an oak forest, with pasture to the west. North is the wall of the citadel, and south is the edge of the cave.", "font": {"size": 14}}, {"id": "ufrst3", "label": "ufrst3\nUnderground forest.", "title": "This is a very agreeable oak forest through which you find yourself walking. To the north is a wheatfield, and to the southeast can be heard a spring.", "font": {"size": 14}}, {"id": "spring", "label": "spring\nSpring.", "title": "You are stood in a leafy part of the forest. From the cave wall comes forth a spring, which tumbles into a little pool and seeps away again into the earth. All around is more wall, for this is a large crack, save to the northwest where the forest continues.", "font": {"size": 14}}, {"id": "topcit", "label": "topcit\nTop of citadel.", "title": "This is the top of the citadel, from where you can see all the surrounding cave. Directly above you can be seen a hole, high up in the mountain, and it occurs to you that this citadel was so placed as to catch the light precisely and create the wondrous effects visible elsewhere in the cavern. There is a gateway to the east.", "font": {"size": 14}}, {"id": "ufrst5", "label": "ufrst5\nUnderground forest.", "title": "This is the forest at the back of the citadel. There is the cave wall to the east, but the forest continues northwest and southwest.", "font": {"size": 14}}, {"id": "entrnc", "label": "entrnc\nEntrance to citadel.", "title": "You are stood at the entrance to the dwarfen citadel, at the top of some steps which run downwards to the east. West, a gateway provides the only other exit from the room. The walls are decorated in curious stones and wierd etchings, but none are removable or readable.", "font": {"size": 14}}, {"id": "dwstep", "label": "dwstep\nDwarf steps.", "title": "You are using some narrow, closely-spaced stairs, which descend in a straight line from a room to the west to a doorway to the east. At the top of the steps are strange decorations, presumably put there to ward off evil presences, such as yours...", "font": {"size": 14}}, {"id": "dwhall", "label": "dwhall\nDwarfen hall.", "title": "The room in which you stand is impressive in size, even by non-dwarf standards. High above is a red brick ceiling, and the floor is decorated by a colourful, if crudely-made, mosaic. There are low passages leading off to the north and east, and a higher passage to the south (probably so long weapons don't scratch the roof). West is a doorway, which looks well-used.", "font": {"size": 14}}, {"id": "lowps1", "label": "lowps1\nLow passage.", "title": "You are walking down a low, well-trodden passage. To the north, the passage continues, and to the south it opens out into a large hall. East is what looks like a kitchen, and to the west is a doorway.", "font": {"size": 14}}, {"id": "lowps2", "label": "lowps2\nLow passage.", "title": "You are stood in a low, dwarfen passage, which runs from the south, turns to the east, and continues. There is an opening on the north wall into a room, and to the west is a doorway.", "font": {"size": 14}}, {"id": "lowps3", "label": "lowps3\nLow passage.", "title": "This is a low, east-west passage. At the west end, it continues on into the dark, but at the east end it opens up onto a comparatively large room. To the northeast is an opening, from which issues a peculiar odour.", "font": {"size": 14}}, {"id": "dwfood", "label": "dwfood\nFood store.", "title": "This is the room the dwarfs who live here use to store their food supplies. It is packed full of assorted vittles and foodstuffs, most of which are in too small quantities for you to bother with. The only way out is through a doorway to the east.", "font": {"size": 14}}, {"id": "dwstre", "label": "dwstre\nDwarf store.", "title": "Herein, the dwarfs keep most of their equipment and tools. The walls are hung with assorted spades, clothes, planks of wood and the like, but most are too small for you to use. The only exit is a doorway to the east.", "font": {"size": 14}}, {"id": "dwroom", "label": "dwroom\nDwarf room.", "title": "This is a room which seems to have been recently constructed by the dwarfs who inhabit this realm, for at the moment it has no furnishings or even a door. The only way out is via an opening to the south which leads onto the bend of a low passage.", "font": {"size": 14}}, {"id": "dwbog", "label": "dwbog\nDwarf lavatory.", "title": "This is the small room the dwarfs use to excrete their waste bodily products. Although there is no door (the exit is an opening to the southwest), privacy is maintained by the room being on a slight upward slant, out of the line of sight from the passage outside. Understandably, being such a small room, there is a pungent odour here.", "font": {"size": 14}}, {"id": "dwcant", "label": "dwcant\nCanteen.", "title": "This is the room where the dwarfs partake of their meals. It is quite large, and has a long table running down the middle, bolted to the ground. There are two low passages leaving the room; one to the west, and one to the south. To the southwest is a doorway, and there are no other exits. The walls are painted in pictures of grassy pastures.", "font": {"size": 14}}, {"id": "dwktch", "label": "dwktch\nDwarf kitchen.", "title": "You are stood in the dwarf kitchen, quite large and full of kitchen- like utensils which are regretably too small to be of use to you. There is a doorway to the northeast, with food stains on the floor near it, and an opening onto a low passage to the west. North is a pit in which refuse is thrown to decompose away.", "font": {"size": 14}}, {"id": "dwpit", "label": "dwpit\nRefuse pit.", "title": "This evil-smelling room is where the dwarfs toss their rubbish, from the kitchen. All around are masses of decomposing foodstuffs, in various states of decay, and filty, broken articles not even the previous owners would be able to recognise. The only way out is via a short climb to the south.", "font": {"size": 14}}, {"id": "lowps4", "label": "lowps4\nLow passage.", "title": "This is a low passage, leading from what appears to be a canteen to the north, to a doorway at the southern end.", "font": {"size": 14}}, {"id": "lowps5", "label": "lowps5\nLow passage.", "title": "You are striding down a low passage, which forms a sort of T-junction. To the west, it leads into a large hall, and to the east it opens up into a room, whereas south, it carries on into the dark.", "font": {"size": 14}}, {"id": "dwrm1", "label": "dwrm1\nDwarf room.", "title": "This is a general-purpose room, used by the dwarfs for some of their normal everyday activities. Strewn about it in a seemingly random fashion, yet firmly fixed to the floor, are various items of furniture and the like. There is a doorway to the north, and a low passage leading off to the west.", "font": {"size": 14}}, {"id": "guard1", "label": "guard1\nDwarf guard room.", "title": "You are stood in a guard room built specifically to prevent access, presumably to the doorway which is to the south. There are crimson stains on the floor which have been unsuccessfully attempted to be removed. North is an opening onto a large hall, and southeast is another room.", "font": {"size": 14}}, {"id": "guard2", "label": "guard2\nDwarf guard room.", "title": "This is the inner guard room. The wall is decorated in battle scenes, all of which end in the dwarfs winning. North is a doorway, and south a low passage. To the west is a weapon store, which it appears the room is primarily designed to guard.", "font": {"size": 14}}, {"id": "wpnstr", "label": "wpnstr\nWeapon store.", "title": "All about you is the most horrifying assortment of weapons you care to envisage. Although they are too small for you to use in the main, the various iron maidens, thumbscrews and racks also present show that the dwarfs also use the room for torturing prisoners and each other. The only exit is to the east, into a guard room.", "font": {"size": 14}}, {"id": "lowps7", "label": "lowps7\nLow passage.", "title": "You are stood in a low passage connecting two guard rooms, one to the north and one to the south. There is a doorway to the west which is of polished wood, and seems to be to somewhere very important.", "font": {"size": 14}}, {"id": "guard3", "label": "guard3\nDwarf guard room.", "title": "You are in a guard room, bedecked in fine war trophies, most of which are out of reach on the surprisingly high walls. The room is normally reached by a low passage to the north, but to the south is a doorway of very old oak, shined and polished to perfection. Obviously, it hides something regarded with importance.", "font": {"size": 14}}, {"id": "minrm", "label": "minrm\nMinisterial room.", "title": "This is the dwarfen parliament room, where the king's ministers debate the issues of the dwarfen realm. It is richly fashioned with oak fittings, designed to hold, say, ten or so dwarfs excluding the king himself. There is a doorway to the east, and a guard room to the south.", "font": {"size": 14}}, {"id": "guard4", "label": "guard4\nDwarf guard room.", "title": "This is the home of the king's guard, special, hand-picked troops of the highest order, pledged to lay their lives down in order to save that of their regal master. To the north is a room which seems to indicate use as a debating forum of some kind, and from it through this room runs a red fitted carpet to a doorway in the south wall. The doorway itself is of heavy oak, and although elegantly finished seems to be built more with strength in mind than ornamentation.", "font": {"size": 14}}, {"id": "kingrm", "label": "kingrm\nThrone room.", "title": "This is the throne room, the very seat of power in the dwarfen realm. It is luxuriously carpeted, and the walls are painted gold. It is here that the dwarfen king holds audiences and receives oaths of fealty. The king's study is to the east, and southwest lies the royal bedroom. A doorway in the north wall is the only other exit.", "font": {"size": 14}}, {"id": "kqdorm", "label": "kqdorm\nRoyal bedroom.", "title": "It is here that the dwarfen king and queen sleep. The room is furnished with the normal bedroom paraphenalia, all dwarf-sized however so not much good for you. The walls are a regal purple, and the floor is of a soft, mossy material. The only exit is to the throne room, northeast.", "font": {"size": 14}}, {"id": "kingst", "label": "kingst\nKing's study.", "title": "You are stood in the room the dwarfen king uses for much of his work. A hollow cut out into the wall is obviously used for a desk, and it is built with comfort and practicality in mind. The throne room is easily accessed to the west, and there is a low passage to the south. North is a doorway, of exceptionally old oak, well-tended and polished.", "font": {"size": 14}}, {"id": "lowps8", "label": "lowps8\nLow passage.", "title": "You are in a low passage, which curves from a study to the north to end in a doorway to the east.", "font": {"size": 14}}, {"id": "ktreas", "label": "ktreas\nKing's treasure chamber.", "title": "This room is built to house the crown jewels and other assorted treasures of the dwarfen realm. It is austere in itself, and the only way out is through a doorway to the west.", "font": {"size": 14}}, {"id": "lowps6", "label": "lowps6\nLow passage.", "title": "You are in a low passage, which heads north to become the central leg of a T-junction, and runs south to end in a doorway. East, it opens up into a room.", "font": {"size": 14}}, {"id": "dwrm2", "label": "dwrm2\nDwarf room.", "title": "This is a room used by the dwarfs for everyday living, mainly by the females and children. There is a doorway to the north, and another room to the south. Northwest, there is an opening onto a guard room.", "font": {"size": 14}}, {"id": "dwrm3", "label": "dwrm3\nDwarf room.", "title": "You are stood in a very large room which the dwarfs use to manufacture most of their goods. Dotted about all over are dozens of machines of varying degrees of complexity, some so strange and old it is doubtful that any of the dwarfs even know what they do. There is a thick wooden door to the south, apparently for sound-proofing, and a low passage leads off to the west.", "font": {"size": 14}}, {"id": "dwrm4", "label": "dwrm4\nDwarf room.", "title": "You look about to find yourself in a room used mainly during the evenings and for relaxation. The older dwarfs are the kind you'd expect to find here, for it is surprisingly quiet and well furnished. There is another room to the north, and a low passage to the east. South you observe a doorway.", "font": {"size": 14}}, {"id": "kdorm", "label": "kdorm\nChildren's dormitory.", "title": "This is the room where the young dwarfs sleep. The walls are decorated in pictures of bunnies and pussies, and give the room a soft, dreamy effect. The parents' dormitory is to the east, and to the north is a door.", "font": {"size": 14}}, {"id": "pdorm", "label": "pdorm\nMarried quarters.", "title": "You are stood in the room in which live the married dwarfs. The various sub-rooms are discretely curtained off from each other, although the curtains are of course firmly fixed down to prevent their being stolen. The dormitory of their young is to the west, and northwards is a low passage.", "font": {"size": 14}}, {"id": "lowps9", "label": "lowps9\nLow passage.", "title": "You are standing in a low passage, with three exits. West, the passage leads into a room; south it opens into a dormitory; north, it ends in a doorway.", "font": {"size": 14}}, {"id": "odorm", "label": "odorm\nOfficers' dormitory.", "title": "This rather smart room is used as living quarters for officers and other high-ranking dwarfs. Its walls are painted mainly in portraits of dwarfs which all seem to look the same, due to their large beards. To the south is a doorway, and to the north the large dormitory of the lower dwarfs.", "font": {"size": 14}}, {"id": "dorm", "label": "dorm\nDormitory.", "title": "This is a large room, wherein sleep most of the unmarried dwarfs. It is full of little hammocks upon which the dwarfs rest, sturdily fixed to the wall to prevent their theft. To the south is the more classy Officers' dormitory, and to the north is a heavy doorway, built to be sound-proof.", "font": {"size": 14}}, {"id": "rail4", "label": "rail4\nRailway track.", "title": "You are stood on a section of rusted railway line, which runs out from a tin mine in the base of a huge cliff to the east. Northwards is a paddock where the pit ponies used to be kept, and south east forest. Southwest is a mound, which the track cuts through as it continues to the west.", "font": {"size": 14}}, {"id": "rail3", "label": "rail3\nRailway track.", "title": "You are stood on a section of east-west railway line, which continues in both directions. To the south is a mound through which the track is cutting, and to the north are a dale, and a paddock of some kind.", "font": {"size": 14}}, {"id": "rail2", "label": "rail2\nRailway track.", "title": "This is an east-west railway track, running through some very pleasant surroundings. To the north and southwest are peaceful dales, and to the south lies a drowsy forest. A hillock to the southeast is cut through by the track as it heads east towards the base of a mighty cliff.", "font": {"size": 14}}, {"id": "rail1", "label": "rail1\nRailway track.", "title": "This is the last section of a railway line. It continues to the east where it cuts through some dales, but to the west it stops at the beach. Northwards is a stony slope also leading to the beach, and to the southwest is a like slope, covered in scrubs.", "font": {"size": 14}}, {"id": "stslop", "label": "stslop\nStony slope.", "title": "This is a slope running down from a dale in the east to a beach in the west. North is forest, and to the south is a section of railway line which runs east-west.", "font": {"size": 14}}, {"id": "ndale", "label": "ndale\nNorth dale.", "title": "You are stood in a quiet dale, at the foot of some gentle hills which rise drowsily to the north, their slopes drenched in the emerald colour of the trees which grow upon them. To the west the dale tails off into a stony slope reaching down to the shore, and east is a paddock of some description. To the south, before another forest, runs an east- west railway track.", "font": {"size": 14}}, {"id": "paddck", "label": "paddck\nPaddock.", "title": "This is a paddock, where once were kept the ponies which used to haul the heavy skips of tin from the mine down to the jetty on the beach. They have long since gone, but the railway line along which they used to toil is still intact, to the south. Westwards is a dale, and to northeast a ruin of some stone building. Eastwards, travel is impossible due to the enormous cliff which rises up into a mountain far into the clouds.", "font": {"size": 14}}, {"id": "ruin", "label": "ruin\nRuin.", "title": "This conglomeration of stone which lies forlornly in the grass is all that is left of the outer buildings belonging to the nearby tinmine, before bad times fell upon it. Age and the weather have since reduced the once proud structures to moss-covered misshapen arrangements of rubble. To the north is a forest, and to the east an enormous cliff at the base of a huge, snow-capped mountain. Elsewhere is a pony paddock.", "font": {"size": 14}}, {"id": "nfrst5", "label": "nfrst5\nDense forest.", "title": "You are stood in some dense forest, which slopes down to the south.", "font": {"size": 14}}, {"id": "nfrst6", "label": "nfrst6\nDense forest.", "title": "You are stood in some dense forest, which slopes down to the south.", "font": {"size": 14}}, {"id": "nfrst7", "label": "nfrst7\nDense forest.", "title": "You are stood in some dense forest, which slopes down to the south, where stones and masonry indicate once stood buildings, over which the forest has now extended.", "font": {"size": 14}}, {"id": "beach3", "label": "beach3\nStony beach.", "title": "The beach upon which you are stood is covered in stones, a legacy of the days when mining material would fall from the skips of ore as they were loaded aboard merchantmen. To the north, the beach continues, and to the west is the sea. East is a slope covered in scrubs, which rises up to a dale. On the northern part of the beach can be seen a jetty. Southwards, however, a headland with high cliffs cuts off the way.", "font": {"size": 14}}, {"id": "beach4", "label": "beach4\nStony beach.", "title": "This is a beach covered in stones of irregular size. To the north the cliffs rise, forming a cove which cuts off the area, but southwards the beach continues. A railway line runs from the east, and to the west a jetty forces itself out into the waves. To the southeast and northeast, slopes rise up into dales.", "font": {"size": 14}}, {"id": "shrine", "label": "shrine\nShrine.", "title": "You are inside a small yet sacrosanct shrine. A sense of deep respectfulness fills this modest room. The way out, into a pine forest, is to the northwest. It is obvious that the shrine was meant to be used for quiet meditation, like similar chambers.", "font": {"size": 14}}, {"id": "osanct", "label": "osanct\nOuter sanctum.", "title": "You find yourself in the outer sanctum of some strange, holy temple. All about you, the walls seem to be a hazy, formless blackness, but there is a visible opening to the north from whence comes an errie, golden light.", "font": {"size": 14}}, {"id": "isanct", "label": "isanct\nInner sanctum.", "title": "This is the inner sanctum of a most reverend shrine. Thousands of years it has existed, with only the highest of high priests permitted to enter this hallowed room. The walls are a strange, misty black, and golden light comes from an indeterminate source high above. An opening to the south leads to the outer sanctum, but the bizarre walls may lead elsewhere, too...", "font": {"size": 14}}, {"id": "jetty", "label": "jetty\nJetty.", "title": "This is a wooden jetty, which forces itself out into the sea. To the east is the beach, but otherwise all around is the sea.", "font": {"size": 14}}, {"id": "hdland", "label": "hdland\nHeadland.", "title": "This is a small headland, jutting out of the island in a southeasterly direction. All around the peninsula is rough sea, except to the northwest, where a thicket is situated, and northwards where is a sandy cove.", "font": {"size": 14}}, {"id": "cove", "label": "cove\nCove.", "title": "You are stood in a sandy, windswept cove to the east of the island. South is a barren headland, and southwest a thicket. To the north is forest, and to the northwest a clearing, near which the indigenous birds of the island refuse to fly. Eastwards is the rough sea.", "font": {"size": 14}}, {"id": "ifrst1", "label": "ifrst1\nArcane forest.", "title": "You are stood in the awful hideousness of an arcane forest, its trees misshapen collections of charred and splintered branches. All around to the west rages the savage sea, and to the north the forest continues. Eastwards, it has been cleared where it becomes a steep slope.", "font": {"size": 14}}, {"id": "ifrst2", "label": "ifrst2\nArcane forest.", "title": "This ancient forest in which you are stood looks to have been laid to waste millennia ago, by some immense fire-breathing creation of the evil gods. To the west, the relentless bombardment of the sea continues, and to the east is a steep slope. South, the forest is the same, but northwards it becomes foliated again.", "font": {"size": 14}}, {"id": "ifrst3", "label": "ifrst3\nOak forest.", "title": "This is a forest of oak trees, in the northwest corner of the island. To the south the forest has been ravaged by some diabolic evil, and to the east is normal forest sloping upwards. West and north, the rough sea batters away at the rugged coastline.", "font": {"size": 14}}, {"id": "ifrst4", "label": "ifrst4\nSloping forest.", "title": "This is a sparse forest, which slopes from the south upwards to the north. At the south end is a cove, which meets the rough sea that is to the east. Southwest is an evil place, where such wildlife as inhabits the island does not dare travel. To the west the forest clears, and to the north is a clearing, upon which you can see a ring of huge stones.", "font": {"size": 14}}, {"id": "ifrst6", "label": "ifrst6\nSloping forest.", "title": "This is a forest on a steep hill, leading from an oak forest to the west upwards to a clearing containing a huge ring of stones to the north. Southwards the trees also end, and to the north the rough sea crashes against the island.", "font": {"size": 14}}, {"id": "ifrst5", "label": "ifrst5\nThicket.", "title": "This is a thicket, straddling the island. To the southeast it isolates a barren headland, and to the east is a windswept cove. West is wilderness which slopes up northwards, and to the north is level ground, but over which hangs an aura of intense danger.", "font": {"size": 14}}, {"id": "slope1", "label": "slope1\nSteep slope.", "title": "This is a steep slope, running upwards to the north. Beyond more slopes, at the top of the rock, a huge ring of stones can be seen, a scene which dominates the whole island. To the east is a thicket, and to the west an arcane forest. Southwards, the slope meets the sea in a bay which looks just about calm enough to sail a small craft.", "font": {"size": 14}}, {"id": "fring", "label": "fring\nFairy ring.", "title": "You are stood in a desolate spot. The only noise is the howling wind as it comes off the sea beyond a cove to the southeast. In the centre of this wilderness is a fairy ring, a circle etched out by toadstools many centuries before. No animals or birds of the island will go in the area, although it it large enough for a human to enter. North and west are slopes leading upwards to a plateau at the top of the rock of an island, and northeast is forest.", "font": {"size": 14}}, {"id": "slope2", "label": "slope2\nSteep slope.", "title": "You are stood on a steep slope, leading upwards to the north. At the top, there levels out a plateau on the top of the rock which is this island. East is forest, south and west more wilderness.", "font": {"size": 14}}, {"id": "slope3", "label": "slope3\nSteep slope.", "title": "This is a cleared piece of wilderness which slopes up northeastwards. All around is more of the same, except to the west where is a strange and arcane forest.", "font": {"size": 14}}, {"id": "slope4", "label": "slope4\nSteep slope.", "title": "This is a stretch of wilderness sloping upwards to the east onto a plateau surmounted by a druidic ring of stones. North is s forest, and west the slope levels out into a forest of oak.", "font": {"size": 14}}, {"id": "rost", "label": "rost\nRing of stones.", "title": "You find yourself overawed by the huge ring of stones which encircle this, the highest part of the island rock. As the wind sweeps over from the rugged cliffs to the east and north, the whistling is broken only by the lonely cries of the ravens which hover above. To the south and west are steep slopes downwards. Far, far away in the distance on the southeast horizon can be glimpsed the sail of a wrecked ship. In the centre of the ring of stones is a large, heavy, bloodstained, slate, sacrificial slab. Many people have been killed here.", "font": {"size": 14}}, {"id": "brost", "label": "brost\nBeneath ring of stones.", "title": "You are underneath the ring of stones, in a druidic chamber not entered these past two thousand years until today. Light comes from the way out, which is above. The walls of the chamber are stained red wit
